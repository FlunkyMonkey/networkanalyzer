apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxmox-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/component: infra-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxmox-exporter
        app.kubernetes.io/component: infra-telemetry
    spec:
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:3.5.3
          ports:
            - name: metrics
              containerPort: 9221
              protocol: TCP
          env:
            - name: PVE_USER
              valueFrom:
                secretKeyRef:
                  name: proxmox-credentials
                  key: pve-user
            - name: PVE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: proxmox-credentials
                  key: pve-password
            - name: PVE_VERIFY_SSL
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/component: infra-telemetry
spec:
  selector:
    app.kubernetes.io/name: proxmox-exporter
  ports:
    - name: metrics
      port: 9221
      targetPort: metrics
      protocol: TCP
