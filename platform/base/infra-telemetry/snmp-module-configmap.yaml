apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-module-config
  namespace: network-observability
  labels:
    app.kubernetes.io/component: infra-telemetry
data:
  # MikroTik SNMP module for the prometheus-snmp-exporter.
  # Covers IF-MIB interface counters for bandwidth utilization.
  # The SNMP community string is read from the snmp-credentials Secret at runtime
  # via the exporter's --config.expand-environment-variables flag or external auth config.
  #
  # For production use, generate this config from snmp_exporter's generator tool
  # using MikroTik MIBs for full OID coverage. This is a functional starting point.
  snmp.yml: |
    auths:
      mikrotik_v2:
        community: SNMP_COMMUNITY
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2

    modules:
      mikrotik:
        walk:
          - 1.3.6.1.2.1.2.2      # ifTable — interface counters
          - 1.3.6.1.2.1.31.1.1   # ifXTable — 64-bit counters
          - 1.3.6.1.2.1.1        # system — device identity
        metrics:
          - name: ifHCInOctets
            oid: 1.3.6.1.2.1.31.1.1.1.6
            type: counter
            help: Total bytes received on interface (64-bit).
            indexes:
              - labelname: ifIndex
                type: Integer
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString
          - name: ifHCOutOctets
            oid: 1.3.6.1.2.1.31.1.1.1.10
            type: counter
            help: Total bytes transmitted on interface (64-bit).
            indexes:
              - labelname: ifIndex
                type: Integer
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString
          - name: ifOperStatus
            oid: 1.3.6.1.2.1.2.2.1.8
            type: gauge
            help: "Operational status of interface (1=up, 2=down)."
            indexes:
              - labelname: ifIndex
                type: Integer
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
          - name: ifSpeed
            oid: 1.3.6.1.2.1.2.2.1.5
            type: gauge
            help: Interface speed in bits per second.
            indexes:
              - labelname: ifIndex
                type: Integer
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
          - name: sysName
            oid: 1.3.6.1.2.1.1.5.0
            type: DisplayString
            help: Device system name.
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3.0
            type: gauge
            help: Device uptime in hundredths of a second.
