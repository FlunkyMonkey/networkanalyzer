apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-telemetry-dashboards
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: infra-telemetry
data:
  # Grafana dashboard JSON files are loaded by the sidecar.
  # Each key is a filename, each value is the dashboard JSON.

  interface-utilization.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "MikroTik core switch interface bandwidth via SNMP. Inbound/outbound bit rates and utilization % per interface. Thresholds: 50% yellow, 80% red. Mixed 1G/10G environment — utilization % accounts for interface speed."
          }
        },
        {
          "title": "Interface Bandwidth — Inbound (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "rate(ifHCInOctets{ifDescr!~\"lo\"}[5m]) * 8",
              "legendFormat": "{{ifDescr}} ({{ifAlias}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Interface Bandwidth — Outbound (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(ifHCOutOctets{ifDescr!~\"lo\"}[5m]) * 8",
              "legendFormat": "{{ifDescr}} ({{ifAlias}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Interface Utilization %",
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 11 },
          "targets": [
            {
              "expr": "(rate(ifHCInOctets{ifDescr!~\"lo|bridge.*\"}[5m]) * 8 * 100) / (ifHighSpeed{ifDescr!~\"lo|bridge.*\"} * 1e6 > 0)",
              "legendFormat": "{{ifDescr}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "snmp", "mikrotik", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Switch Interface Utilization",
      "uid": "infra-iface-util"
    }

  unifi-clients.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "UniFi wireless client bandwidth from UnPoller. Per-client RX/TX bit rates, active WiFi client count, and AP uptime. Useful for tracking per-device wireless usage and identifying bandwidth-heavy clients."
          }
        },
        {
          "title": "WLAN Client Bandwidth — RX (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "rate(unpoller_client_receive_bytes_total[5m]) * 8",
              "legendFormat": "{{name}} ({{mac}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "WLAN Client Bandwidth — TX (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(unpoller_client_transmit_bytes_total[5m]) * 8",
              "legendFormat": "{{name}} ({{mac}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Connected WLAN Clients",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 11 },
          "targets": [
            {
              "expr": "count(unpoller_client_receive_bytes_total)",
              "legendFormat": "WiFi Clients"
            }
          ]
        },
        {
          "title": "AP Status",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 16, "x": 8, "y": 11 },
          "targets": [
            {
              "expr": "unpoller_device_uptime_seconds",
              "legendFormat": "{{name}}",
              "format": "table",
              "instant": true
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "unifi", "wlan", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "UniFi AP & WLAN Clients",
      "uid": "infra-unifi-clients"
    }

  proxmox-vms.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "Proxmox VM network bandwidth from the Proxmox VE exporter (`pve_network_receive/transmit_bytes`). The PVE exporter does not expose node-level counters (`pve_node_info_netin/netout` are absent), so the bottom panel derives **switch-authoritative** per-host bandwidth from the MikroTik uplink port each node connects to (prox1→ether7, prox2→ether6, prox3→ether19, prox4→ether23, prox5→ether3). This reflects each host's physical NIC traffic (host + its VMs on that uplink)."
          }
        },
        {
          "title": "VM Network Receive (bps)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "rate(pve_network_receive_bytes[5m]) * 8",
              "legendFormat": "{{id}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "VM Network Transmit (bps)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(pve_network_transmit_bytes[5m]) * 8",
              "legendFormat": "{{id}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Per-Host Network — Switch-Authoritative (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 11 },
          "targets": [
            {
              "expr": "rate(ifHCInOctets{ifDescr=~\"ether3|ether6|ether7|ether19|ether23\"}[5m]) * 8",
              "legendFormat": "{{ifAlias}} ▼ in"
            },
            {
              "expr": "rate(ifHCOutOctets{ifDescr=~\"ether3|ether6|ether7|ether19|ether23\"}[5m]) * 8",
              "legendFormat": "{{ifAlias}} ▲ out"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["compute", "proxmox", "vm", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Proxmox Node & VM Network",
      "uid": "infra-proxmox-net"
    }

  switch-hardware.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "Network switch and AP hardware health. **MikroTik CRS328-24P-4S+** via SNMP (`mikrotik_health_sensor`, by `sensor` label) — temperatures, fan speeds, PSU voltage/current, PoE-out. **UniFi** APs/switches via UnPoller (`unpoller_device_*`). Voltage/current/power sensors are read in deci-units and scaled ×0.1 here."
          }
        },
        {
          "title": "MikroTik Temperatures (°C)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "mikrotik_health_sensor{sensor=~\"cpu-temperature|board-temperature1\"}",
              "legendFormat": "{{sensor}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": { "fillOpacity": 10 },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 75 }
                ]
              }
            }
          }
        },
        {
          "title": "MikroTik Fan Speed (RPM)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "mikrotik_health_sensor{sensor=~\"fan.*-speed\"}",
              "legendFormat": "{{sensor}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "rotrpm",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "MikroTik PSU Voltage (V)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 10 },
          "targets": [
            {
              "expr": "mikrotik_health_sensor{sensor=~\"psu.*-voltage\"} * 0.1",
              "legendFormat": "{{sensor}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "volt" } }
        },
        {
          "title": "MikroTik PSU Current (A)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 10 },
          "targets": [
            {
              "expr": "mikrotik_health_sensor{sensor=~\"psu.*-current\"} * 0.1",
              "legendFormat": "{{sensor}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "amp" } }
        },
        {
          "title": "MikroTik PoE-Out Consumption (W)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 10 },
          "targets": [
            {
              "expr": "mikrotik_health_sensor{sensor=\"poe-out-consumption\"} * 0.1",
              "legendFormat": "PoE-out"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "watt" } }
        },
        {
          "title": "UniFi Devices (UnPoller)",
          "type": "text",
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 15 },
          "options": { "mode": "markdown", "content": "UniFi access points and switches — device-level health from UnPoller." }
        },
        {
          "title": "UniFi Device Temperature (°C)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 17 },
          "targets": [
            {
              "expr": "unpoller_device_temperature_celsius",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "UniFi CPU / Memory Utilization (%)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 17 },
          "targets": [
            {
              "expr": "unpoller_device_cpu_utilization_ratio * 100",
              "legendFormat": "{{name}} cpu"
            },
            {
              "expr": "unpoller_device_memory_utilization_ratio * 100",
              "legendFormat": "{{name}} mem"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "UniFi Device Status",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "unpoller_device_uptime_seconds",
              "legendFormat": "{{name}}",
              "format": "table",
              "instant": true
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "hardware", "mikrotik", "unifi", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "Network Switch & AP Hardware Health",
      "uid": "infra-switch-hw"
    }

  truenas-storage.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "TrueNAS storage health for TrueNAS01 (172.18.1.96, SSD) and TrueNAS02 (172.18.1.97, HDD) via the TrueNAS REST API v2.0. Answers: is storage **healthy**, **protected** (scrub/alerts), and **replicating**? Capacity, fragmentation, scrub errors, active alerts, and replication-task state."
          }
        },
        {
          "title": "Pool Status",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 3 },
          "targets": [
            { "expr": "truenas_pool_healthy", "legendFormat": "{{host}}/{{pool}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "HEALTHY", "color": "green" }, "0": { "text": "UNHEALTHY", "color": "red" } } }
              ],
              "thresholds": { "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "Active CRITICAL Alerts",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 3 },
          "targets": [
            { "expr": "sum by (host) (truenas_alerts{level=\"CRITICAL\"})", "legendFormat": "{{host}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "Replication Errors",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 3 },
          "targets": [
            { "expr": "truenas_replication_error", "legendFormat": "{{host}}: {{task}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "OK", "color": "green" }, "1": { "text": "FAILED", "color": "red" } } }
              ],
              "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "Pool Capacity Used (%)",
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "truenas_pool_allocated_bytes / truenas_pool_size_bytes * 100", "legendFormat": "{{host}}/{{pool}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 } ] }
            }
          }
        },
        {
          "title": "Pool Free Space",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "truenas_pool_free_bytes", "legendFormat": "{{host}}/{{pool}}", "instant": true }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "title": "Fragmentation (%)",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 14 },
          "targets": [
            { "expr": "truenas_pool_fragmentation_ratio", "legendFormat": "{{host}}/{{pool}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 80 } ] }
            }
          }
        },
        {
          "title": "Scrub Errors",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 14 },
          "targets": [
            { "expr": "truenas_pool_scrub_errors", "legendFormat": "{{host}}/{{pool}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "Disks per Host",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 14 },
          "targets": [
            { "expr": "truenas_disk_count", "legendFormat": "{{host}}", "instant": true }
          ]
        },
        {
          "title": "Active Alerts by Level",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 20 },
          "targets": [
            { "expr": "truenas_alerts > 0", "legendFormat": "{{host}} {{level}}", "instant": true }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "title": "Replication Tasks",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 20 },
          "targets": [
            { "expr": "truenas_replication_state", "legendFormat": "{{host}} {{task}} {{state}}", "format": "table", "instant": true }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["storage", "truenas", "zfs", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "TrueNAS Storage Health",
      "uid": "infra-truenas"
    }

  server-hardware.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "Physical server hardware health via IPMI (Supermicro X9 BMCs). **Coverage: prox1 (BMC 172.18.1.21 / mbipmi02) and prox4 (BMC 172.18.1.11 / mbipmi01) only** — prox2/prox3 (Lenovo TS140) and prox5 (HP MicroServer) have no usable BMC. CPU Temp on these boards is threshold-only (no analog reading); System/Peripheral temps are shown."
          }
        },
        {
          "title": "BMC Reachable",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 3 },
          "targets": [
            { "expr": "min by (host) (ipmi_up)", "legendFormat": "{{host}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none" }
        },
        {
          "title": "Worst Sensor State",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 3 },
          "targets": [
            { "expr": "max by (host) (ipmi_sensor_state < 3)", "legendFormat": "{{host}}", "instant": true }
          ],
          "fieldConfig": {
            "defaults": {
