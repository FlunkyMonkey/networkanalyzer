apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-telemetry-dashboards
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: infra-telemetry
data:
  # Grafana dashboard JSON files are loaded by the sidecar.
  # Each key is a filename, each value is the dashboard JSON.

  interface-utilization.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "MikroTik core switch interface bandwidth via SNMP. Inbound/outbound bit rates and utilization % per interface. Thresholds: 50% yellow, 80% red. Mixed 1G/10G environment — utilization % accounts for interface speed."
          }
        },
        {
          "title": "Interface Bandwidth — Inbound (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "rate(ifHCInOctets{ifDescr!~\"lo\"}[5m]) * 8",
              "legendFormat": "{{ifDescr}} ({{ifAlias}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Interface Bandwidth — Outbound (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(ifHCOutOctets{ifDescr!~\"lo\"}[5m]) * 8",
              "legendFormat": "{{ifDescr}} ({{ifAlias}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Interface Utilization %",
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 11 },
          "targets": [
            {
              "expr": "(rate(ifHCInOctets[5m]) * 8 / ifSpeed) * 100",
              "legendFormat": "{{ifDescr}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 80 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "snmp", "mikrotik", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Switch Interface Utilization",
      "uid": "infra-iface-util"
    }

  unifi-clients.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "UniFi wireless client bandwidth from UnPoller. Per-client RX/TX bit rates, active WiFi client count, and AP uptime. Useful for tracking per-device wireless usage and identifying bandwidth-heavy clients."
          }
        },
        {
          "title": "WLAN Client Bandwidth — RX (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "rate(unpoller_client_receive_bytes_total[5m]) * 8",
              "legendFormat": "{{name}} ({{mac}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "WLAN Client Bandwidth — TX (bits/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(unpoller_client_transmit_bytes_total[5m]) * 8",
              "legendFormat": "{{name}} ({{mac}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Connected WLAN Clients",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 11 },
          "targets": [
            {
              "expr": "count(unpoller_client_receive_bytes_total{radio!=\"\"})",
              "legendFormat": "WiFi Clients"
            }
          ]
        },
        {
          "title": "AP Status",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 16, "x": 8, "y": 11 },
          "targets": [
            {
              "expr": "unpoller_device_uptime_seconds",
              "legendFormat": "{{name}}",
              "format": "table",
              "instant": true
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "unifi", "wlan", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "UniFi AP & WLAN Clients",
      "uid": "infra-unifi-clients"
    }

  proxmox-vms.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "Proxmox VM network bandwidth from the Proxmox VE exporter (`pve_network_receive/transmit_bytes`). Node-level network counters are not exposed by the current exporter version — see the notice panel below."
          }
        },
        {
          "title": "VM Network Receive (bps)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "rate(pve_network_receive_bytes{type=~\"qemu|lxc\"}[5m]) * 8",
              "legendFormat": "{{name}} ({{id}}) [{{node}}]"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "VM Network Transmit (bps)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(pve_network_transmit_bytes{type=~\"qemu|lxc\"}[5m]) * 8",
              "legendFormat": "{{name}} ({{id}}) [{{node}}]"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Node-Level Network Counters",
          "type": "text",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 11 },
          "options": {
            "mode": "markdown",
            "content": "**Node-level network counters are not exposed by the current Proxmox VE exporter.** The metrics `pve_node_info_netin` / `pve_node_info_netout` do not exist in the live Prometheus scrape. Per-VM receive/transmit panels above are the available granularity. Node totals can be approximated by summing VMs per node in the panels above."
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["compute", "proxmox", "vm", "infra-telemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Proxmox Node & VM Network",
      "uid": "infra-proxmox-net"
    }
