# Quantum Fiber modem exporter — stdlib Python (no deps), polls the Calix
# C6500XK admin API over HTTPS. Password from the quantum-modem-credentials
# Secret (out-of-band). See the script ConfigMap header for the discovery notes
# and the optical-not-available caveat.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-modem-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: quantum-modem-exporter
    app.kubernetes.io/component: infra-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: quantum-modem-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quantum-modem-exporter
        app.kubernetes.io/component: infra-telemetry
    spec:
      containers:
        - name: quantum-modem-exporter
          image: python:3.12-slim
          command: ["python3", "/app/quantum_modem_exporter.py"]
          ports:
            - name: metrics
              containerPort: 9891
              protocol: TCP
          env:
            - name: MODEM_HOST
              value: "192.168.0.1"
            - name: MODEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quantum-modem-credentials
                  key: password
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 96Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: quantum-modem-exporter-script
---
apiVersion: v1
kind: Service
metadata:
  name: quantum-modem-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: quantum-modem-exporter
    app.kubernetes.io/component: infra-telemetry
spec:
  selector:
    app.kubernetes.io/name: quantum-modem-exporter
  ports:
    - name: metrics
      port: 9891
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: quantum-modem-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: quantum-modem-exporter
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: quantum-modem-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
