# ServiceMonitors for custom exporters.
# These are scraped by the existing cluster Prometheus in the monitoring namespace.
# The existing Prometheus selects ServiceMonitors with: release: kube-prometheus-stack
# The SNMP exporter's ServiceMonitor is managed by its Helm chart (see snmp-exporter-values.yaml).

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller
  namespace: network-observability
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /pve
      params:
        target:
          # Proxmox cluster API endpoint.
          - proxmox.local:8006
