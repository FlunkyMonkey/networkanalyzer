# ServiceMonitors for custom exporters.
# These are scraped by the existing cluster Prometheus in the monitoring namespace.
# The existing Prometheus selects ServiceMonitors with: release: kube-prometheus-stack
# The SNMP exporter's ServiceMonitor is managed by its Helm chart (see snmp-exporter-values.yaml).

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller
  namespace: network-observability
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
# Proxmox VE Exporter — one endpoint per Proxmox host.
# The exporter acts as a proxy: Prometheus scrapes /pve?target=<host> for each.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /pve
      params:
        target:
          - "172.18.1.10:8006"
    - port: metrics
      interval: 60s
      path: /pve
      params:
        target:
          - "172.18.1.20:8006"
    - port: metrics
      interval: 60s
      path: /pve
      params:
        target:
          - "172.18.1.30:8006"
    - port: metrics
      interval: 60s
      path: /pve
      params:
        target:
          - "172.18.1.40:8006"
    - port: metrics
      interval: 60s
      path: /pve
      params:
        target:
          - "172.18.1.50:8006"
---
# IPMI exporter — one endpoint per BMC (proxy-scrape pattern, like the Proxmox
# exporter above). Host attribution verified in-band 2026-06-08 (`ipmitool lan
# print 1` on prox1 returned 172.18.1.21): mbipmi02 (.21) = prox1, and by
# elimination mbipmi01 (.11) = prox4. Note the IPs are counterintuitive — .11
# is NOT prox1's BMC.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ipmi-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: ipmi-exporter
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ipmi-exporter
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 45s
      path: /ipmi
      params:
        target:
          - "172.18.1.11"
      relabelings:
        - sourceLabels: [__param_target]
          targetLabel: bmc
          action: replace
        - targetLabel: bmc_name
          replacement: mbipmi01
          action: replace
        - targetLabel: host
          replacement: prox4
          action: replace
    - port: metrics
      interval: 60s
      scrapeTimeout: 45s
      path: /ipmi
      params:
        target:
          - "172.18.1.21"
      relabelings:
        - sourceLabels: [__param_target]
          targetLabel: bmc
          action: replace
        - targetLabel: bmc_name
          replacement: mbipmi02
          action: replace
        - targetLabel: host
          replacement: prox1
          action: replace
---
# TrueNAS exporter — scrapes the stdlib Python exporter that queries the
# TrueNAS REST API v2.0 for both storage hosts (truenas01, truenas02).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: truenas-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: truenas-exporter
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: truenas-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
      scrapeTimeout: 30s
---
# Firewalla edge exporter — WAN/alarm/host/policy state via SSH polling.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: firewalla-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: firewalla-exporter
    app.kubernetes.io/component: infra-telemetry
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: firewalla-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
