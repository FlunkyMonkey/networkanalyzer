apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpoller
  namespace: network-observability
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/component: infra-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unpoller
        app.kubernetes.io/component: infra-telemetry
    spec:
      containers:
        - name: unpoller
          image: ghcr.io/unpoller/unpoller:v2.14.2
          ports:
            - name: metrics
              containerPort: 9130
              protocol: TCP
          env:
            # UniFi controller connection — credentials from Secret.
            - name: UP_UNIFI_DEFAULT_URL
              valueFrom:
                secretKeyRef:
                  name: unpoller-credentials
                  key: unifi-url
            - name: UP_UNIFI_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: unpoller-credentials
                  key: unifi-user
            - name: UP_UNIFI_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: unpoller-credentials
                  key: unifi-password
            # Prometheus output mode.
            - name: UP_PROMETHEUS_DISABLE
              value: "false"
            - name: UP_PROMETHEUS_HTTP_LISTEN
              value: "0.0.0.0:9130"
            - name: UP_INFLUXDB_DISABLE
              value: "true"
            # Poll interval — 30s for near-real-time client metrics.
            - name: UP_POLLER_DEBUG
              value: "false"
            - name: UP_UNIFI_DEFAULT_SAVE_SITES
              value: "true"
            - name: UP_UNIFI_DEFAULT_SAVE_DPI
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: unpoller
  namespace: network-observability
  labels:
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/component: infra-telemetry
spec:
  selector:
    app.kubernetes.io/name: unpoller
  ports:
    - name: metrics
      port: 9130
      targetPort: metrics
      protocol: TCP
