# Firewalla edge exporter script. Collects WAN/alarm/host/policy state from the
# Firewalla Gold SE over SSH (dedicated key in the firewalla-ssh Secret; the
# Firewalla's redis and firerouter APIs bind to localhost only, so SSH is the
# transport). Scripted-component pattern.
#
# Dependency note: paramiko (pinned) is pip-installed at container start —
# no official image ships python3 + an ssh client together, and the repo
# pattern avoids custom-built images. PyPI egress is already required by the
# cluster (GeoIP downloads).
#
# Metrics (gauge unless noted):
#   firewalla_up                          1 if the SSH collection succeeded
#   firewalla_wan_carrier                 1 = WAN link up (eth0 sysfs carrier)
#   firewalla_wan_info{ip}                1, WAN IP as label
#   firewalla_alarms_active               active alarm count (alarm_active zset)
#   firewalla_hosts_tracked               devices Firewalla knows (host:mac:*)
#   firewalla_policies_active             blocking/routing rules (policy:<id>)
#   firewalla_uptime_seconds              gateway uptime
#   firewalla_cpu_temp_celsius            SoC temperature
#   firewalla_load1                       1-minute load average
apiVersion: v1
kind: ConfigMap
metadata:
  name: firewalla-exporter-script
  namespace: network-observability
  labels:
    app.kubernetes.io/name: firewalla-exporter
    app.kubernetes.io/component: infra-telemetry
data:
  firewalla_exporter.py: |
    import os, threading, time
    from http.server import BaseHTTPRequestHandler, HTTPServer

    import paramiko

    HOST = os.environ.get("FIREWALLA_HOST", "172.18.1.1")
    USER = os.environ.get("FIREWALLA_USER", "pi")
    KEY = os.environ.get("SSH_KEY_PATH", "/ssh/id_ed25519")
    INTERVAL = int(os.environ.get("POLL_INTERVAL", "60"))
    PORT = int(os.environ.get("EXPORTER_PORT", "9890"))
    WAN_IF = os.environ.get("WAN_INTERFACE", "eth0")

    REMOTE_CMD = "; ".join([
        'echo carrier $(cat /sys/class/net/%s/carrier 2>/dev/null)' % WAN_IF,
        'echo wan_ip $(ip -4 -o addr show %s | head -1 | awk "{print \\$4}")' % WAN_IF,
        'echo uptime $(cut -d. -f1 /proc/uptime)',
        'echo temp $(cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null)',
        'echo load $(cut -d" " -f1 /proc/loadavg)',
        'echo alarms $(redis-cli zcard alarm_active 2>/dev/null)',
        'echo hosts $(redis-cli --scan --pattern "host:mac:*" 2>/dev/null | wc -l)',
        'echo policies $(redis-cli --scan --pattern "policy:[0-9]*" 2>/dev/null | wc -l)',
    ])

    STATE = {"up": 0}

    def collect():
        c = paramiko.SSHClient()
        c.set_missing_host_key_policy(paramiko.AutoAddPolicy())
        c.connect(HOST, username=USER, key_filename=KEY, timeout=15,
                  banner_timeout=15, auth_timeout=15)
        try:
            _, out, _ = c.exec_command(REMOTE_CMD, timeout=30)
            d = {}
            for line in out.read().decode().splitlines():
                parts = line.split(None, 1)
                if len(parts) == 2:
                    d[parts[0]] = parts[1].strip()
            return d
        finally:
            c.close()

    def loop():
        while True:
            try:
                d = collect()
                STATE.update(d)
                STATE["up"] = 1
            except Exception as e:
                STATE["up"] = 0
                print("collect failed: %s" % e, flush=True)
            time.sleep(INTERVAL)

    def num(key, scale=1.0):
        try:
            return float(STATE.get(key, "")) * scale
        except (TypeError, ValueError):
            return None

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path.startswith("/metrics"):
                L = ["firewalla_up %d" % STATE.get("up", 0)]
                carrier = num("carrier")
                if carrier is not None:
                    L.append("firewalla_wan_carrier %d" % carrier)
                ip = STATE.get("wan_ip", "")
                if ip:
                    L.append('firewalla_wan_info{ip="%s"} 1' % ip.replace('"', ""))
                for metric, key, scale in [
                    ("firewalla_alarms_active", "alarms", 1),
                    ("firewalla_hosts_tracked", "hosts", 1),
                    ("firewalla_policies_active", "policies", 1),
                    ("firewalla_uptime_seconds", "uptime", 1),
                    ("firewalla_cpu_temp_celsius", "temp", 0.001),
                    ("firewalla_load1", "load", 1),
                ]:
                    v = num(key, scale)
                    if v is not None:
                        L.append("%s %g" % (metric, v))
                body = ("\n".join(L) + "\n").encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers()
                self.wfile.write(body)
            elif self.path in ("/healthz", "/"):
                self.send_response(200); self.end_headers(); self.wfile.write(b"ok\n")
            else:
                self.send_response(404); self.end_headers()
        def log_message(self, *a):
            pass

    if __name__ == "__main__":
        threading.Thread(target=loop, daemon=True).start()
        print("firewalla-exporter on :%d (poll %ds, host %s)" % (PORT, INTERVAL, HOST), flush=True)
        HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
