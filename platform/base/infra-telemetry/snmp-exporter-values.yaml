# prometheus-snmp-exporter values for MikroTik CRS328 interface monitoring.
# Chart version: 9.13.1
#
# The custom SNMP config (auths + modules) is inlined via the chart's `config`
# value. The chart mounts this as /etc/snmp_exporter/snmp.yml — the path the
# exporter actually reads. A separate ConfigMap mounted elsewhere does NOT work
# because the exporter only loads from its default config path.

serviceMonitor:
  enabled: true
  # Override the default selector label so the existing cluster Prometheus picks this up.
  # Existing Prometheus selects: release: kube-prometheus-stack
  selector:
    release: kube-prometheus-stack
  module:
    - mikrotik
  auth:
    - mikrotik_v2
  params:
    - name: mikrotik-crs328
      target: 172.18.1.13
      interval: 60s
      scrapeTimeout: 30s

# Inline the SNMP module + auth config. The chart creates its own ConfigMap
# and mounts it at /etc/snmp_exporter/snmp.yml.
#
# Community string: the MikroTik uses the default read-only community "public"
# (non-sensitive default; the switch is a LAN-internal L2 device with SNMP
# read-only access). It is inlined here because it is not a secret. If you move
# the switch to a non-default/private community, switch to the Secret +
# `--config.expand-environment-variables` pattern in secrets-and-bootstrap.md
# (Option B) so the value is not committed to git.
config: |-
  auths:
    mikrotik_v2:
      community: public
      security_level: noAuthNoPriv
      auth_protocol: MD5
      priv_protocol: DES
      version: 2

  modules:
    mikrotik:
      walk:
        - 1.3.6.1.2.1.2.2
        - 1.3.6.1.2.1.31.1.1
        - 1.3.6.1.2.1.1
        # MIKROTIK-MIB health sensor table (mtxrHlSensor): names at .100.1.2.<id>,
        # values at .100.1.3.<id>. Exposes cpu/board temperature, fan speeds,
        # PSU voltage/current, and PoE-out consumption on the CRS328-24P-4S+.
        - 1.3.6.1.4.1.14988.1.1.3.100.1
      metrics:
        - name: ifHCInOctets
          oid: 1.3.6.1.2.1.31.1.1.1.6
          type: counter
          help: Total bytes received on interface (64-bit).
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
            - labels: [ifIndex]
              labelname: ifAlias
              oid: 1.3.6.1.2.1.31.1.1.1.18
              type: DisplayString
        - name: ifHCOutOctets
          oid: 1.3.6.1.2.1.31.1.1.1.10
          type: counter
          help: Total bytes transmitted on interface (64-bit).
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
            - labels: [ifIndex]
              labelname: ifAlias
              oid: 1.3.6.1.2.1.31.1.1.1.18
              type: DisplayString
        - name: ifOperStatus
          oid: 1.3.6.1.2.1.2.2.1.8
          type: gauge
          help: "Operational status of interface (1=up, 2=down)."
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
        - name: ifSpeed
          oid: 1.3.6.1.2.1.2.2.1.5
          type: gauge
          help: Interface speed in bits per second (32-bit; reads 0 above ~4Gbps).
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
        # 64-bit speed in Mbps (ifXTable). Use ifHighSpeed * 1e6 as the
        # utilization denominator so 10G SFP+ uplinks (where ifSpeed overflows
        # to 0) compute correctly. Same ifDescr+ifAlias lookups as ifHCInOctets
        # so the two divide with matching label sets.
        - name: ifHighSpeed
          oid: 1.3.6.1.2.1.31.1.1.1.15
          type: gauge
          help: Interface speed in Mbps (64-bit, ifXTable).
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
            - labels: [ifIndex]
              labelname: ifAlias
              oid: 1.3.6.1.2.1.31.1.1.1.18
              type: DisplayString
        - name: sysName
          oid: 1.3.6.1.2.1.1.5.0
          type: DisplayString
          help: Device system name.
        - name: sysUpTime
          oid: 1.3.6.1.2.1.1.3.0
          type: gauge
          help: Device uptime in hundredths of a second.
        # MikroTik health sensors. One gauge per sensor, identified by the
        # `sensor` label (cpu-temperature, board-temperature1, fan1-speed,
        # fan2-speed, psu1-voltage, psu2-voltage, psu1-current, psu2-current,
        # poe-out-consumption). Units: temperature degC; fan RPM; voltage/
        # current/power in deci-units (multiply by 0.1 in dashboards).
        - name: mikrotik_health_sensor
          oid: 1.3.6.1.4.1.14988.1.1.3.100.1.3
          type: gauge
          help: MikroTik health sensor value; see the sensor label for name and units.
          indexes:
            - labelname: sensorIndex
              type: Integer
          lookups:
            - labels: [sensorIndex]
              labelname: sensor
              oid: 1.3.6.1.4.1.14988.1.1.3.100.1.2
              type: DisplayString

# Resource limits — SNMP exporter is lightweight.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
