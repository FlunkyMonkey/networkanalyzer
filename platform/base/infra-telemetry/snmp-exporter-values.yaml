# prometheus-snmp-exporter values for MikroTik CRS328 interface monitoring.
# Chart version: 9.13.1
#
# The custom SNMP config (auths + modules) is inlined via the chart's `config`
# value. The chart mounts this as /etc/snmp_exporter/snmp.yml — the path the
# exporter actually reads. A separate ConfigMap mounted elsewhere does NOT work
# because the exporter only loads from its default config path.

serviceMonitor:
  enabled: true
  # Override the default selector label so the existing cluster Prometheus picks this up.
  # Existing Prometheus selects: release: kube-prometheus-stack
  selector:
    release: kube-prometheus-stack
  module:
    - mikrotik
  auth:
    - mikrotik_v2
  params:
    - name: mikrotik-crs328
      target: 172.18.1.13
      interval: 60s
      scrapeTimeout: 30s

# Inline the SNMP module + auth config. The chart creates its own ConfigMap
# and mounts it at /etc/snmp_exporter/snmp.yml.
# Replace SNMP_COMMUNITY with the actual community string before deployment.
# See docs/observability/secrets-and-bootstrap.md.
config: |-
  auths:
    mikrotik_v2:
      community: SNMP_COMMUNITY
      security_level: noAuthNoPriv
      auth_protocol: MD5
      priv_protocol: DES
      version: 2

  modules:
    mikrotik:
      walk:
        - 1.3.6.1.2.1.2.2
        - 1.3.6.1.2.1.31.1.1
        - 1.3.6.1.2.1.1
      metrics:
        - name: ifHCInOctets
          oid: 1.3.6.1.2.1.31.1.1.1.6
          type: counter
          help: Total bytes received on interface (64-bit).
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
            - labels: [ifIndex]
              labelname: ifAlias
              oid: 1.3.6.1.2.1.31.1.1.1.18
              type: DisplayString
        - name: ifHCOutOctets
          oid: 1.3.6.1.2.1.31.1.1.1.10
          type: counter
          help: Total bytes transmitted on interface (64-bit).
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
            - labels: [ifIndex]
              labelname: ifAlias
              oid: 1.3.6.1.2.1.31.1.1.1.18
              type: DisplayString
        - name: ifOperStatus
          oid: 1.3.6.1.2.1.2.2.1.8
          type: gauge
          help: "Operational status of interface (1=up, 2=down)."
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
        - name: ifSpeed
          oid: 1.3.6.1.2.1.2.2.1.5
          type: gauge
          help: Interface speed in bits per second.
          indexes:
            - labelname: ifIndex
              type: Integer
          lookups:
            - labels: [ifIndex]
              labelname: ifDescr
              oid: 1.3.6.1.2.1.2.2.1.2
              type: DisplayString
        - name: sysName
          oid: 1.3.6.1.2.1.1.5.0
          type: DisplayString
          help: Device system name.
        - name: sysUpTime
          oid: 1.3.6.1.2.1.1.3.0
          type: gauge
          help: Device uptime in hundredths of a second.

# Resource limits — SNMP exporter is lightweight.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
