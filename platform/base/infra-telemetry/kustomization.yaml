apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure / Telemetry Plane
# Standalone Grafana + exporters for MikroTik, UniFi, and Proxmox.
# Scrape backend is the existing cluster Prometheus in the monitoring namespace.
# This repo does NOT deploy Prometheus or Prometheus Operator.

labels:
  - pairs:
      app.kubernetes.io/component: infra-telemetry
    includeSelectors: false

resources:
  - unpoller-deployment.yaml
  - proxmox-exporter-deployment.yaml
  - servicemonitors.yaml
  - grafana-dashboards-configmap.yaml
  - grafana-home-dashboard.yaml

# Charts are vendored locally in charts/ so Kustomize never pulls from remote.
# This prevents ArgoCD repo-server cache failures caused by repeated helm pull
# attempts on cached source paths where the chart tgz/directory already exists.
# To upgrade: helm pull <chart> --version <new> --untar --untardir charts/tmp,
# then replace charts/<name>/ with the new content, update version comment, commit.
helmGlobals:
  chartHome: charts

helmCharts:
  - name: grafana
    version: "10.5.15"  # vendored at charts/grafana/
    releaseName: grafana
    namespace: network-observability
    valuesFile: grafana-values.yaml

  - name: prometheus-snmp-exporter
    version: "9.13.1"  # vendored at charts/prometheus-snmp-exporter/
    releaseName: snmp-exporter
    namespace: network-observability
    valuesFile: snmp-exporter-values.yaml
