# Firewalla edge exporter — SSH-polls the Firewalla Gold SE (172.18.1.1) for
# WAN/alarm/host/policy state. Dedicated SSH key from the firewalla-ssh Secret
# (created out-of-band; pubkey installed on the Firewalla 2026-06-10).
# paramiko is pip-installed (pinned) at start — see the script ConfigMap header.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewalla-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: firewalla-exporter
    app.kubernetes.io/component: infra-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: firewalla-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firewalla-exporter
        app.kubernetes.io/component: infra-telemetry
    spec:
      containers:
        - name: firewalla-exporter
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - pip install --no-cache-dir --quiet paramiko==3.5.1 && exec python3 /app/firewalla_exporter.py
          ports:
            - name: metrics
              containerPort: 9890
              protocol: TCP
          env:
            - name: FIREWALLA_HOST
              value: "172.18.1.1"
            - name: WAN_INTERFACE
              value: "eth0"
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
            - name: ssh-key
              mountPath: /ssh
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: firewalla-exporter-script
        - name: ssh-key
          secret:
            secretName: firewalla-ssh
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: firewalla-exporter
  namespace: network-observability
  labels:
    app.kubernetes.io/name: firewalla-exporter
    app.kubernetes.io/component: infra-telemetry
spec:
  selector:
    app.kubernetes.io/name: firewalla-exporter
  ports:
    - name: metrics
      port: 9890
      targetPort: metrics
      protocol: TCP
