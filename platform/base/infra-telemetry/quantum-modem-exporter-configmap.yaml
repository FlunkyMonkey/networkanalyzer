# Quantum Fiber modem exporter (Calix C6500XK at 192.168.0.1).
#
# Discovery (2026-06-11): the modem's admin web UI is a Calix/Axon React app
# whose only auth is a plaintext form POST to /cgi/cgi_action
# (username=admin&password=...), returning a Session-Id cookie; data comes from
# GET /cgi/cgi_get?Object=<obj>. No browser/crypto needed → stdlib exporter.
#
# Optical RX/TX power IS available (Modem Status -> WAN Status reads it): the
# object is `Device.Optical.Interface.1` queried WITH an explicit param list and
# NO trailing dot (the bare `Device.Optical.Interface.1.` form returns Invalid).
# OpticalSignalLevel (RX) and TransmitOpticalLevel (TX) are TR-181 units of
# 0.001 dBm (x0.001 -> dBm). The PON link_state is the ONT's fiber-side view,
# complementary to the Firewalla's eth0 carrier (LAN side).
#
# Metrics:
#   quantum_modem_up                     1 if login + query succeeded
#   quantum_modem_wan_link_up            1 if PON link_state == connected
#   quantum_modem_wan_net_up             1 if net_state == connected
#   quantum_modem_uplink_rate_kbps
#   quantum_modem_downlink_rate_kbps
#   quantum_modem_uptime_seconds
#   quantum_modem_optical_rx_dbm         received optical signal level (dBm)
#   quantum_modem_optical_tx_dbm         transmit optical level (dBm)
#   quantum_modem_optical_line_good      1 if X_AXON_LineStatus == GOOD
#   quantum_modem_optical_link_uptime_seconds
#   quantum_modem_optical_connection_failures
#   quantum_modem_info{model,software,wan_ip,device}   1
apiVersion: v1
kind: ConfigMap
metadata:
  name: quantum-modem-exporter-script
  namespace: network-observability
  labels:
    app.kubernetes.io/name: quantum-modem-exporter
    app.kubernetes.io/component: infra-telemetry
data:
  quantum_modem_exporter.py: |
    import json, os, ssl, threading, time, urllib.parse, urllib.request
    import http.cookiejar
    from http.server import BaseHTTPRequestHandler, HTTPServer

    HOST = os.environ.get("MODEM_HOST", "192.168.0.1")
    USER = os.environ.get("MODEM_USER", "admin")
    PASS = os.environ.get("MODEM_PASSWORD", "")
    INTERVAL = int(os.environ.get("POLL_INTERVAL", "60"))
    PORT = int(os.environ.get("EXPORTER_PORT", "9891"))
    CTX = ssl._create_unverified_context()
    BASE = "https://%s" % HOST

    STATE = {"up": 0}

    def session():
        jar = http.cookiejar.CookieJar()
        opener = urllib.request.build_opener(
            urllib.request.HTTPSHandler(context=CTX),
            urllib.request.HTTPCookieProcessor(jar))
        body = urllib.parse.urlencode({"username": USER, "password": PASS}).encode()
        opener.open(urllib.request.Request(BASE + "/cgi/cgi_action", data=body), timeout=15).read()
        return opener

    def cgi_get(opener, obj):
        url = BASE + "/cgi/cgi_get?Object=" + urllib.parse.quote(obj, safe="=&.")
        return json.loads(opener.open(url, timeout=15).read().decode())

    def params(doc):
        out = {}
        for o in doc.get("Objects", []):
            for p in o.get("Param", []):
                out[p.get("ParamName")] = p.get("ParamValue")
        return out

    def collect():
        op = session()
        wan = cgi_get(op, "GetConnectionStatus").get("wan_status", {})
        info = params(cgi_get(op, "Device.DeviceInfo&ModelName=&SoftwareVersion=&UpTime="))
        opt = params(cgi_get(op, "Device.Optical.Interface.1&OpticalSignalLevel=&"
                             "TransmitOpticalLevel=&X_AXON_LineStatus=&X_AXON_LinkUpTime=&"
                             "X_AXON_ConnectionFailures="))
        return {
            "link": 1 if wan.get("link_state") == "connected" else 0,
            "net": 1 if wan.get("net_state") == "connected" else 0,
            "up_rate": wan.get("uplink_rate"),
            "down_rate": wan.get("downlink_rate"),
            "ip": (wan.get("ipaddr") or "").split("/")[0],
            "device": wan.get("device", ""),
            "model": info.get("ModelName", ""),
            "software": info.get("SoftwareVersion", ""),
            "uptime": info.get("UpTime"),
            # Optical: TR-181 OpticalSignalLevel / TransmitOpticalLevel are 0.001 dBm.
            "rx": opt.get("OpticalSignalLevel"),
            "tx": opt.get("TransmitOpticalLevel"),
            "line_good": 1 if opt.get("X_AXON_LineStatus") == "GOOD" else 0,
            "link_uptime": opt.get("X_AXON_LinkUpTime"),
            "conn_failures": opt.get("X_AXON_ConnectionFailures"),
        }

    def loop():
        while True:
            try:
                STATE.update(collect()); STATE["up"] = 1
            except Exception as e:
                STATE["up"] = 0
                print("collect failed: %s" % e, flush=True)
            time.sleep(INTERVAL)

    def num(v):
        try:
            return float(v)
        except (TypeError, ValueError):
            return None

    class H(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path.startswith("/metrics"):
                L = ["quantum_modem_up %d" % STATE.get("up", 0)]
                if STATE.get("up"):
                    L.append("quantum_modem_wan_link_up %d" % STATE.get("link", 0))
                    L.append("quantum_modem_wan_net_up %d" % STATE.get("net", 0))
                    for metric, key in [("quantum_modem_uplink_rate_kbps", "up_rate"),
                                        ("quantum_modem_downlink_rate_kbps", "down_rate"),
                                        ("quantum_modem_uptime_seconds", "uptime"),
                                        ("quantum_modem_optical_line_good", "line_good"),
                                        ("quantum_modem_optical_link_uptime_seconds", "link_uptime"),
                                        ("quantum_modem_optical_connection_failures", "conn_failures")]:
                        v = num(STATE.get(key))
                        if v is not None:
                            L.append("%s %g" % (metric, v))
                    # optical power: scale 0.001 dBm -> dBm
                    for metric, key in [("quantum_modem_optical_rx_dbm", "rx"),
                                        ("quantum_modem_optical_tx_dbm", "tx")]:
                        v = num(STATE.get(key))
                        if v is not None:
                            L.append("%s %g" % (metric, v * 0.001))
                    L.append('quantum_modem_info{model="%s",software="%s",wan_ip="%s",device="%s"} 1'
                             % (STATE.get("model", ""), STATE.get("software", ""),
                                STATE.get("ip", ""), STATE.get("device", "")))
                body = ("\n".join(L) + "\n").encode()
                self.send_response(200)
                self.send_header("Content-Type", "text/plain; version=0.0.4")
                self.end_headers(); self.wfile.write(body)
            elif self.path in ("/healthz", "/"):
                self.send_response(200); self.end_headers(); self.wfile.write(b"ok\n")
            else:
                self.send_response(404); self.end_headers()
        def log_message(self, *a):
            pass

    if __name__ == "__main__":
        threading.Thread(target=loop, daemon=True).start()
        print("quantum-modem-exporter on :%d (poll %ds, host %s)" % (PORT, INTERVAL, HOST), flush=True)
        HTTPServer(("0.0.0.0", PORT), H).serve_forever()
