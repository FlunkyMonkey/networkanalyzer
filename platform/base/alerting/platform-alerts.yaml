# Starter alert pack for the network observability platform (Wave 8).
#
# Loaded by the existing kube-prometheus-stack Prometheus (ruleSelector matches
# release: kube-prometheus-stack across all namespaces). Every expression here
# was validated against live data before shipping (2026-06-08); all alert
# metrics carry namespace="network-observability" so the email sub-route
# (alertmanager-config.yaml) matches them.
#
# Scope: collection health, storage, hardware. The fuller pack (flow-ingest
# stall, interface saturation, capacity forecasting) is tracked in
# docs/observability/backlog.md under Wave 8.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: network-observability-platform-alerts
  namespace: network-observability
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: network-observability-platform-alerts
spec:
  groups:
    - name: platform-collection
      rules:
        - alert: PlatformExporterDown
          expr: up{namespace="network-observability"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Platform exporter down: {{ $labels.job }}"
            description: >-
              Scrape target {{ $labels.job }} (instance {{ $labels.instance }})
              in network-observability has been down for 10 minutes. The
              corresponding telemetry plane is dark — this is how the MikroTik
              SNMP outage went unnoticed before Wave 6.
        - alert: DailyReportJobFailed
          expr: kube_job_status_failed{namespace="network-observability", job_name=~"daily-status-report-.*"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Daily status report job failed"
            description: >-
              The 06:00 Pacific heartbeat report job {{ $labels.job_name }}
              failed. Check its pod logs. Note: if SMTP itself is broken this
              alert email will not arrive either — the morning report's absence
              is the ultimate dead-man signal.

    - name: platform-storage
      rules:
        - alert: TrueNASReplicationFailing
          expr: truenas_replication_error == 1
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "TrueNAS replication failing on {{ $labels.host }}"
            description: >-
              Replication task "{{ $labels.task }}" on {{ $labels.host }} is in
              ERROR state — the backup is not running. Check TrueNAS UI →
              Data Protection → Replication.
        - alert: TrueNASCriticalAlerts
          expr: truenas_alerts{level="CRITICAL"} > 0
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "{{ $value }} CRITICAL TrueNAS alert(s) on {{ $labels.host }}"
            description: >-
              The TrueNAS alert system on {{ $labels.host }} has active
              CRITICAL alerts. Review them in the TrueNAS UI (bell icon).
        - alert: TrueNASPoolUnhealthy
          expr: truenas_pool_healthy == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "TrueNAS pool {{ $labels.pool }} UNHEALTHY on {{ $labels.host }}"
            description: >-
              ZFS pool {{ $labels.pool }} on {{ $labels.host }} reports
              unhealthy (DEGRADED/FAULTED). Check vdev and disk status
              immediately.
        - alert: TrueNASPoolCapacityHigh
          expr: truenas_pool_allocated_bytes / truenas_pool_size_bytes > 0.85
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "TrueNAS pool {{ $labels.pool }} over 85% full"
            description: >-
              Pool {{ $labels.pool }} on {{ $labels.host }} is above 85%
              capacity. ZFS performance degrades sharply when nearly full —
              plan cleanup or expansion.

    - name: platform-flow
      rules:
        - alert: FlowIngestStalled
          expr: sum(rate(vector_component_sent_events_total{component_id="opensearch"}[10m])) < 1
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Flow ingest stalled — Vector is not shipping events to OpenSearch"
            description: >-
              The Vector → OpenSearch sink has sent fewer than 1 event/s for
              15 minutes (normal is tens/s). Check the flow-collector pod
              (goflow2 + vector containers) and OpenSearch health. Flow
              dashboards are going stale right now.

    - name: platform-network
      rules:
        - alert: InterfaceSaturatedIn
          expr: (rate(ifHCInOctets{ifDescr!~"lo|bridge.*"}[10m]) * 8) / (ifHighSpeed{ifDescr!~"lo|bridge.*"} * 1e6 > 0) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Switch port {{ $labels.ifDescr }} inbound >85% for 15m"
            description: >-
              {{ $labels.ifDescr }} ({{ $labels.ifAlias }}) sustained above 85%
              of link speed inbound. Check the Switch Interface Utilization
              dashboard and Top Talkers for the cause.
        - alert: InterfaceSaturatedOut
          expr: (rate(ifHCOutOctets{ifDescr!~"lo|bridge.*"}[10m]) * 8) / (ifHighSpeed{ifDescr!~"lo|bridge.*"} * 1e6 > 0) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Switch port {{ $labels.ifDescr }} outbound >85% for 15m"
            description: >-
              {{ $labels.ifDescr }} ({{ $labels.ifAlias }}) sustained above 85%
              of link speed outbound. Check the Switch Interface Utilization
              dashboard and Top Talkers for the cause.

    - name: platform-capacity
      rules:
        - alert: PoolFillsWithin30Days
          # The >70% current-usage guard suppresses burst-slope false positives
          # (e.g. the 2 TiB replication catch-up made predict_linear extrapolate
          # wildly on a 20%-full pool).
          expr: >-
            (predict_linear(truenas_pool_allocated_bytes[7d], 30*86400) > truenas_pool_size_bytes)
            and (truenas_pool_allocated_bytes / truenas_pool_size_bytes > 0.7)
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Pool {{ $labels.pool }} on track to fill within 30 days"
            description: >-
              Linear forecast on the last 7 days of growth says
              {{ $labels.pool }} ({{ $labels.host }}) exceeds capacity within
              30 days, and it is already above 70% used. Plan cleanup or
              expansion now.

    - name: platform-self-audit
      rules:
        - alert: DashboardPanelsNoData
          expr: sum by (dashboard) (dashboard_audit_panels_nodata{dashboard!="none"}) > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "{{ $value }} panel(s) on '{{ $labels.dashboard }}' return No Data"
            description: >-
              The 6-hourly dashboard audit found panels returning no data on
              {{ $labels.dashboard }}. This is the failure mode that silently
              blanked 8 flow panels for 3 weeks (.keyword mapping rot) —
              investigate before it rots.
        - alert: DashboardAuditStale
          expr: >-
            (time() - dashboard_audit_last_run_timestamp_seconds > 28800)
            or (dashboard_audit_success == 0)
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Dashboard self-audit is stale or failing"
            description: >-
              The dashboard-audit exporter has not completed a successful run
              in over 8 hours. Panel rot would go undetected — check the
              dashboard-audit pod logs.

    - name: platform-edge
      rules:
        - alert: FirewallaWANDown
          expr: firewalla_wan_carrier == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "WAN link DOWN on the Firewalla"
            description: >-
              The Firewalla's WAN interface (eth0 to the Quantum Fiber modem)
              has no carrier — the internet is down at the edge. Check the
              modem and the fiber handoff.
        - alert: FirewallaCollectionFailing
          expr: firewalla_up == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Firewalla exporter cannot reach the gateway over SSH"
            description: >-
              Edge telemetry is blind: the firewalla-exporter's SSH collection
              has failed for 10m. If the gateway is actually up, check the
              exporter pod logs and the authorized_keys on the Firewalla
              (firmware updates have been known to reset it).

    - name: platform-wan
      rules:
        - alert: QuantumFiberLinkDown
          expr: quantum_modem_wan_link_up == 0
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "Quantum Fiber PON link DOWN at the ONT"
            description: >-
              The Calix C6500XK reports its fiber (PON) link as down — this is an
              ISP/fiber-side outage, distinct from the Firewalla's LAN-side WAN
              carrier. If FirewallaWANDown is also firing, the whole path is out;
              if only this fires, the problem is upstream of the modem.
        - alert: QuantumModemCollectionFailing
          expr: quantum_modem_up == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Quantum modem exporter cannot reach the modem"
            description: >-
              The quantum-modem-exporter has failed to log in / query the modem
              at 192.168.0.1 for 15m. Edge fiber telemetry is blind. Check the
              pod logs and whether the modem admin password changed.

    - name: platform-wan-optical
      rules:
        - alert: QuantumFiberOpticalRxLow
          expr: quantum_modem_optical_rx_dbm < -27
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Quantum Fiber RX optical power low ({{ $value | printf \"%.1f\" }} dBm)"
            description: >-
              ONT received optical signal level is below -27 dBm, approaching the
              GPON receiver sensitivity limit (~-28 dBm). Indicates a degrading
              fiber path (dirty/bent connector, splitter loss, upstream issue).
              Normal here is around -25 dBm. Check the Edge dashboard trend.

    - name: platform-hardware
      rules:
        - alert: IPMISensorCritical
          expr: ipmi_sensor_state == 2
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "IPMI CRITICAL sensor on {{ $labels.host }}: {{ $labels.name }}"
            description: >-
              Sensor {{ $labels.name }} on {{ $labels.host }} reports CRITICAL
              state via IPMI. Check the Server Hardware dashboard.
        - alert: IPMISensorWarning
          expr: ipmi_sensor_state == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "IPMI warning sensor on {{ $labels.host }}: {{ $labels.name }}"
            description: >-
              Sensor {{ $labels.name }} on {{ $labels.host }} reports WARNING
              state via IPMI (fan/temp/voltage threshold).
        - alert: IPMISELGrowing
          expr: increase(ipmi_sel_logs_count[6h]) > 0
          labels:
            severity: warning
          annotations:
            summary: "BMC event log growing on {{ $labels.host }}"
            description: >-
              {{ $value }} new SEL entr(ies) on {{ $labels.host }} in 6h — new
              hardware events (ECC, fan, power) are being logged. Inspect with
              ipmitool sel elist. Note: prox1's SEL is full (512) and cannot
              grow until cleared after the DIMM2B fix.
        - alert: MikroTikSwitchHot
          expr: mikrotik_health_sensor{sensor="cpu-temperature"} > 65
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "MikroTik CRS328 CPU temperature {{ $value }}°C"
            description: >-
              Core switch CPU temperature above 65°C for 15m (normal ~47°C).
              Check fans on the Switch & AP Hardware dashboard.
