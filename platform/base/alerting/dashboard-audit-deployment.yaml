# Dashboard-audit exporter — replays every dashboard panel query via Grafana's
# /api/ds/query every 6h and exposes No-Data/error counts as metrics.
# Scripted-component pattern (python:3.12-slim + ConfigMap script).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-audit
  namespace: network-observability
  labels:
    app.kubernetes.io/name: dashboard-audit
    app.kubernetes.io/component: alerting
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard-audit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard-audit
        app.kubernetes.io/component: alerting
    spec:
      containers:
        - name: dashboard-audit
          image: python:3.12-slim
          command: ["python3", "/app/dashboard_audit.py"]
          ports:
            - name: metrics
              containerPort: 9899
              protocol: TCP
          env:
            - name: AUDIT_INTERVAL
              value: "21600"
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: admin-user
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: admin-password
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 200m
              memory: 96Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: dashboard-audit-script
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-audit
  namespace: network-observability
  labels:
    app.kubernetes.io/name: dashboard-audit
    app.kubernetes.io/component: alerting
spec:
  selector:
    app.kubernetes.io/name: dashboard-audit
  ports:
    - name: metrics
      port: 9899
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dashboard-audit
  namespace: network-observability
  labels:
    app.kubernetes.io/name: dashboard-audit
    app.kubernetes.io/component: alerting
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard-audit
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
