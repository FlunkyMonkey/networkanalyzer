# Hubble UI standalone deployment.
# Uses the cilium/cilium chart with everything disabled except the UI.
# Connects to Hubble Relay running in kube-system (managed by cluster infra).

# Disable all Cilium components — we only want Hubble UI.
agent: false
operator:
  enabled: false
cni:
  install: false
envoy:
  enabled: false
preflight:
  enabled: false

hubble:
  # Hubble core is managed at the cluster level, not here.
  relay:
    enabled: false
  tls:
    auto:
      enabled: false

  ui:
    enabled: true
    standalone:
      # Deploy Hubble UI without requiring Cilium agent/operator.
      enabled: true
      tls:
        # TLS config for connecting to Relay.
        # If Relay uses TLS, provide client certs here.
        # For lab without TLS on Relay, leave empty.
        certsVolume: {}

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
