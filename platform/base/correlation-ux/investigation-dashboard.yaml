apiVersion: v1
kind: ConfigMap
metadata:
  name: investigation-dashboard
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: correlation-ux
data:
  entity-investigation.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "arrow-left",
          "keepTime": true,
          "title": "Back to Home",
          "url": "/d/correlation-home",
          "type": "link"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "keepTime": false,
          "title": "Open in OpenSearch",
          "url": "http://opensearch-dashboards:5601/app/discover#/?_a=(query:(language:kuery,query:'src_ip:${entity_ip} OR dst_ip:${entity_ip}'))",
          "targetBlank": true,
          "type": "link"
        },
        {
          "asDropdown": false,
          "icon": "external link",
          "keepTime": false,
          "title": "Open in Hubble UI",
          "url": "http://hubble-ui:80",
          "targetBlank": true,
          "type": "link"
        }
      ],
      "panels": [
        {
          "title": "Investigation Path",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## Entity: `${entity_ip}`\n\n**Path-style investigation chain:**\n\n`WAN` → `switch_interface` → **`${entity_ip}`** → `flow destinations` → `pod/service (if K8s)`\n\nUse the panels below to follow this entity across all telemetry planes. Links at the top open specialist UIs for deeper drill-down."
          }
        },
        {
          "title": "Entity Context — Infrastructure Plane",
          "description": "Switch interface carrying traffic for this IP (requires SNMP ARP/MAC correlation — placeholder until full entity correlation is implemented).",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "expr": "count(up{job=~\".*snmp.*\"})",
              "legendFormat": "SNMP Targets Active"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "title": "Entity WiFi Context",
          "description": "If entity is a WLAN client, shows bandwidth.",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "expr": "rate(unifipoller_client_receive_bytes_total{ip=~\"${entity_ip}\"}[5m]) * 8",
              "legendFormat": "RX bps"
            },
            {
              "expr": "rate(unifipoller_client_transmit_bytes_total{ip=~\"${entity_ip}\"}[5m]) * 8",
              "legendFormat": "TX bps"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bps" }
          }
        },
        {
          "title": "Flow Analytics — Traffic from this entity",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 7 },
          "targets": [
            {
              "query": "src_ip:${entity_ip}",
              "bucketAggs": [
                { "type": "terms", "field": "dst_ip", "id": "2", "settings": { "size": "20", "order": "desc", "orderBy": "1" } },
                { "type": "terms", "field": "dst_port", "id": "5", "settings": { "size": "3", "order": "desc", "orderBy": "1" } }
              ],
              "metrics": [
                { "type": "sum", "field": "bytes", "id": "1" },
                { "type": "max", "field": "dst_country", "id": "3" },
                { "type": "max", "field": "app", "id": "4" },
                { "type": "max", "field": "dst_as_org", "id": "6" }
              ],
              "timeField": "@timestamp"
            }
          ],
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Sum bytes" }, "properties": [{ "id": "unit", "value": "decbytes" }, { "id": "displayName", "value": "Bytes" }] },
              { "matcher": { "id": "byName", "options": "Max dst_country" }, "properties": [{ "id": "displayName", "value": "Country" }] },
              { "matcher": { "id": "byName", "options": "Max app" }, "properties": [{ "id": "displayName", "value": "App" }] },
              { "matcher": { "id": "byName", "options": "Max dst_as_org" }, "properties": [{ "id": "displayName", "value": "AS Org" }] }
            ]
          }
        },
        {
          "title": "Flow Analytics — Traffic to this entity",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "targets": [
            {
              "query": "dst_ip:${entity_ip}",
              "bucketAggs": [
                { "type": "terms", "field": "src_ip", "id": "2", "settings": { "size": "20", "order": "desc", "orderBy": "1" } },
                { "type": "terms", "field": "dst_port", "id": "5", "settings": { "size": "3", "order": "desc", "orderBy": "1" } }
              ],
              "metrics": [
                { "type": "sum", "field": "bytes", "id": "1" },
                { "type": "max", "field": "src_country", "id": "3" },
                { "type": "max", "field": "app", "id": "4" }
              ],
              "timeField": "@timestamp"
            }
          ],
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Sum bytes" }, "properties": [{ "id": "unit", "value": "decbytes" }, { "id": "displayName", "value": "Bytes" }] },
              { "matcher": { "id": "byName", "options": "Max src_country" }, "properties": [{ "id": "displayName", "value": "Country" }] },
              { "matcher": { "id": "byName", "options": "Max app" }, "properties": [{ "id": "displayName", "value": "App" }] }
            ]
          }
        },
        {
          "title": "Flow Volume Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 23 },
          "targets": [
            {
              "query": "src_ip:${entity_ip} OR dst_ip:${entity_ip}",
              "bucketAggs": [
                { "type": "date_histogram", "field": "@timestamp", "id": "2", "settings": { "interval": "auto" } }
              ],
              "metrics": [
                { "type": "sum", "field": "bytes", "id": "1" }
              ],
              "timeField": "@timestamp"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "decbytes", "custom": { "fillOpacity": 20 } }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["investigation", "correlation-ux", "specialist"],
      "templating": {
        "list": [
          {
            "name": "entity_ip",
            "type": "textbox",
            "label": "Entity IP Address",
            "current": { "text": "", "value": "" }
          },
          {
            "name": "direction",
            "type": "textbox",
            "label": "Direction (src/dst)",
            "current": { "text": "src", "value": "src" }
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Entity Investigation",
      "uid": "correlation-entity-investigation"
    }
