        }
      ],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "# Investigation Playbooks\nGuided entry points for common network investigations. Each playbook links to the relevant dashboards and specialist UIs with pre-configured filters."
          }
        },
        {
          "title": "Investigate: Slow Internet",
          "type": "text",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 2 },
          "options": {
            "mode": "markdown",
            "content": "### Slow Internet\n**Symptom:** Users report slow browsing or downloads.\n\n**Steps:**\n1. Check [WAN interface utilization](/d/infra-iface-util) — is the uplink saturated?\n2. Check [Top Talkers on Home](/d/correlation-home) — is one device consuming all bandwidth?\n3. If a specific IP is the culprit, [investigate its destinations](/d/correlation-entity-investigation?var-entity_ip=<culprit-ip>&var-direction=src)\n4. Check [WiFi client bandwidth](/d/infra-unifi-clients) — is the client on a weak signal?\n5. Check [country breakdown on Home](/d/correlation-home) — unexpected international traffic?\n\n**Specialist drill-down:**\n- [OpenSearch Dashboards](http://opensearch-dashboards:5601) for full flow search\n- [Hubble UI](http://hubble-ui:80) if K8s workloads are involved"
          }
        },
        {
          "title": "Investigate: Noisy WiFi Client",
          "type": "text",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 2 },
          "options": {
            "mode": "markdown",
            "content": "### Noisy WiFi Client\n**Symptom:** A specific WiFi client is using excessive bandwidth.\n\n**Steps:**\n1. Check [UniFi Client dashboard](/d/infra-unifi-clients) — identify the client by name/MAC\n2. Note the client IP\n3. [Investigate entity](/d/correlation-entity-investigation?var-entity_ip=<client-ip>&var-direction=src) — what destinations is it hitting?\n4. Check the **App** column — is it bulk downloads, streaming, backups?\n5. Check the **Country** column — is traffic going somewhere unexpected?\n\n**Resolution options:**\n- Rate-limit the client at the AP/controller level\n- Block specific destinations if inappropriate\n- Move to a different SSID with bandwidth limits"
          }
        },
        {
          "title": "Investigate: Suspicious Outbound Country",
          "type": "text",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 8 },
          "options": {
            "mode": "markdown",
            "content": "### Suspicious Outbound Country\n**Symptom:** Traffic to an unexpected country appears in the homepage country breakdown.\n\n**Steps:**\n1. On the [Home dashboard](/d/correlation-home), note the country in the pie chart\n2. In [OpenSearch Dashboards](http://opensearch-dashboards:5601), filter: `dst_country:<country>`\n3. Identify which `src_ip` addresses are generating the traffic\n4. For each source, [investigate the entity](/d/correlation-entity-investigation?var-entity_ip=<src-ip>&var-direction=src)\n5. Check destination ports — known services (443, 80) vs unusual ports\n6. Check destination ASN — is it a known CDN/cloud provider or unknown?\n\n**Escalation:**\n- If traffic is to an unknown ASN on an unusual port from an internal server, investigate further\n- Check if the source is a compromised host or a legitimate service"
          }
        },
        {
          "title": "Investigate: Noisy Pod / Workload",
          "type": "text",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 8 },
          "options": {
            "mode": "markdown",
            "content": "### Noisy Pod / Workload\n**Symptom:** A Kubernetes workload is generating excessive network traffic.\n\n**Steps:**\n1. Open [Hubble UI](http://hubble-ui:80) — filter by namespace or workload\n2. Identify the pod IP(s) generating traffic\n3. [Investigate the pod IP](/d/correlation-entity-investigation?var-entity_ip=<pod-ip>&var-direction=src) — what external destinations?\n4. Check [Proxmox VM dashboard](/d/infra-proxmox-net) — is the K8s node VM showing high network use?\n5. Cross-reference: pod IP → node → VM → switch interface\n\n**Resolution options:**\n- Apply a CiliumNetworkPolicy to restrict egress\n- Scale down the workload\n- Investigate the application for bugs/leaks"
          }
        },
        {
          "title": "Investigate: Top Talker Spike",
          "type": "text",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 14 },
          "options": {
            "mode": "markdown",
            "content": "### Top Talker Spike\n**Symptom:** A sudden spike in bytes from one IP in the top talkers table.\n\n**Steps:**\n1. On the [Home dashboard](/d/correlation-home), click the IP in Top Talkers → \"Investigate destinations\"\n2. In the Entity Investigation view, check:\n   - What destinations appeared during the spike?\n   - What ports/apps?\n   - What countries?\n3. Check the **Flow Volume Over Time** panel — when did the spike start/end?\n4. Cross-reference with [switch interface utilization](/d/infra-iface-util) — did a port hit saturation?\n\n**Common causes:**\n- Backup jobs, OS updates, large file transfers\n- Streaming or video calls\n- Data exfiltration (if to unexpected destinations)"
          }
        },
        {
          "title": "Investigate: Interface Saturation",
          "type": "text",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 14 },
          "options": {
            "mode": "markdown",
            "content": "### Interface Saturation\n**Symptom:** A switch interface is consistently at high utilization.\n\n**Steps:**\n1. Check [Switch Interface Utilization](/d/infra-iface-util) — which interface and what %?\n2. Identify what device is on that port (check switch port description/alias)\n3. If it's a server/VM, check [Proxmox VM bandwidth](/d/infra-proxmox-net)\n4. If it's an AP, check [UniFi client dashboard](/d/infra-unifi-clients) — which clients are active?\n5. Check [Top Talkers on Home](/d/correlation-home) — does the device IP appear?\n6. [Investigate the entity](/d/correlation-entity-investigation?var-entity_ip=<device-ip>&var-direction=src) for full flow breakdown\n\n**Resolution options:**\n- Upgrade the link (if trunk/uplink)\n- Identify and throttle the top consumer\n- Load-balance across multiple interfaces"
          }
        }
      ],
