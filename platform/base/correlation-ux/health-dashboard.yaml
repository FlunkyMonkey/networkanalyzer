apiVersion: v1
kind: ConfigMap
metadata:
  name: health-dashboard
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: correlation-ux
data:
  platform-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "arrow-left",
          "keepTime": true,
          "title": "Back to Home",
          "url": "/d/correlation-home",
          "type": "link"
        }
      ],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 2, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "# Platform Health & Freshness\nSelf-observability dashboard. Shows the health of every telemetry source, data freshness, and degraded-state indicators."
          }
        },
        {
          "title": "All Prometheus Scrape Targets",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 2 },
          "targets": [
            {
              "expr": "up",
              "legendFormat": "{{job}} — {{instance}}",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Status" },
                  { "id": "mappings", "value": [
                    { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
                  ]}
                ]
              }
            ]
          }
        },
        {
          "title": "Scrape Duration by Target",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 10 },
          "targets": [
            {
              "expr": "scrape_duration_seconds",
              "legendFormat": "{{job}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 15 }
                ]
              }
            }
          }
        },
        {
          "title": "Scrape Samples by Target",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 10 },
          "targets": [
            {
              "expr": "scrape_samples_scraped",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "title": "Prometheus Storage — TSDB Head Chunks",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "prometheus_tsdb_head_chunks",
              "legendFormat": "Head Chunks"
            }
          ]
        },
        {
          "title": "Prometheus Storage — WAL Size",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 16 },
          "targets": [
            {
              "expr": "prometheus_tsdb_wal_storage_size_bytes",
              "legendFormat": "WAL Size"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "decbytes" }
          }
        },
        {
          "title": "Alertmanager Active Alerts",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 16 },
          "targets": [
            {
              "expr": "count(ALERTS{alertstate=\"firing\"}) or vector(0)",
              "legendFormat": "Firing Alerts"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["health", "correlation-ux", "specialist"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Platform Health & Freshness",
      "uid": "correlation-platform-health"
    }
