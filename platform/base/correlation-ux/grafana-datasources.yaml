# Additional Grafana datasources for cross-plane queries.
# Prometheus is already configured by kube-prometheus-stack.
# This adds OpenSearch for flow data queries from Grafana dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-extra
  namespace: network-observability
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/component: correlation-ux
data:
  opensearch-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: OpenSearch-Flows
        type: grafana-opensearch-datasource
        access: proxy
        url: http://opensearch-cluster-master:9200
        database: "flows-*"
        isDefault: false
        jsonData:
          timeField: "@timestamp"
          version: "2.17.0"
          flavor: "opensearch"
          logLevelField: ""
          logMessageField: ""
