apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Correlation / UX Plane
# Grafana dashboards, datasources, and navigation for the unified platform experience.
# Grafana itself is deployed by the infra-telemetry plane (kube-prometheus-stack).
# This plane adds the cross-plane dashboards, homepage, and investigation tools.

labels:
  - pairs:
      app.kubernetes.io/component: correlation-ux
    includeSelectors: false

resources:
  - grafana-datasources.yaml
  - homepage-dashboard.yaml
  - investigation-dashboard.yaml
  - playbooks-dashboard.yaml
  - health-dashboard.yaml
