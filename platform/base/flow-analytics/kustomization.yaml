apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Flow Analytics Plane
# GoFlow2 + Vector (collector/enrichment) → OpenSearch (storage) → OpenSearch Dashboards (UI)

labels:
  - pairs:
      app.kubernetes.io/component: flow-analytics
    includeSelectors: false

resources:
  - flow-collector-deployment.yaml
  - vector-config.yaml
  - opensearch-ism-policy.yaml
  - opensearch-index-template.yaml
  - opensearch-dashboards-objects.yaml

helmCharts:
  - name: opensearch
    repo: https://opensearch-project.github.io/helm-charts/
    version: "3.6.0"
    releaseName: opensearch
    namespace: network-observability
    valuesFile: opensearch-values.yaml

  - name: opensearch-dashboards
    repo: https://opensearch-project.github.io/helm-charts/
    version: "3.6.0"
    releaseName: opensearch-dashboards
    namespace: network-observability
    valuesFile: opensearch-dashboards-values.yaml
