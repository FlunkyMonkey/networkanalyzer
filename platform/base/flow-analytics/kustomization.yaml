apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Flow Analytics Plane — Wave 2
# GoFlow2 + Vector (collector/enrichment) → OpenSearch (storage) → Grafana (UI)
# OpenSearch Dashboards is NOT deployed. Grafana is the sole UI surface.

labels:
  - pairs:
      app.kubernetes.io/component: flow-analytics
    includeSelectors: false

resources:
  - flow-collector-deployment.yaml
  - vector-config.yaml
  - opensearch-ism-policy.yaml
  - opensearch-index-template.yaml
  - grafana-flow-datasource.yaml
  - grafana-flow-dashboards.yaml

helmCharts:
  - name: opensearch
    repo: https://opensearch-project.github.io/helm-charts/
    version: "3.6.0"
    releaseName: opensearch
    namespace: network-observability
    valuesFile: opensearch-values.yaml
