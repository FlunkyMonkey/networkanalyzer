# OpenSearch values for flow analytics storage.
# Single-node deployment appropriate for homelab.

singleNode: true

replicas: 1

persistence:
  enabled: true
  storageClass: rook-ceph-block
  size: 50Gi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

config:
  opensearch.yml: |
    cluster.name: network-observability
    node.name: opensearch-0
    plugins.security.disabled: true

extraEnvs:
  - name: OPENSEARCH_JAVA_OPTS
    value: "-Xms2g -Xmx2g"
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"
