# OpenSearch values for flow analytics storage.
# Single-node deployment for homelab.
# Node affinity: prefer kube4 (primary), kube2 (fallback).
# Rationale: pin storage-heavy StatefulSet to predictable nodes, avoid scheduler churn.

singleNode: true

replicas: 1

persistence:
  enabled: true
  storageClass: rook-ceph-block
  size: 50Gi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube4
      - weight: 50
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube2

config:
  opensearch.yml: |
    cluster.name: network-observability
    node.name: opensearch-0
    plugins.security.disabled: true

extraEnvs:
  - name: OPENSEARCH_JAVA_OPTS
    value: "-Xms2g -Xmx2g"
  - name: DISABLE_INSTALL_DEMO_CONFIG
    value: "true"
