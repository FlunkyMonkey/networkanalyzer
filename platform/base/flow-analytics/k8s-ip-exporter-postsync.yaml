# PostSync hook for k8s-lookup-tables repopulation (Wave 5c).
#
# Background: ArgoCD v3.3.6 with ServerSideApply=true does not honour
# RespectIgnoreDifferences=true for ConfigMap .data — it applies the
# header-only placeholder from git on every sync, wiping runtime data.
# This hook runs the exporter immediately after each sync so the tables
# are repopulated before flow-collector serves the next enriched flow.
#
# The ignoreDifferences entry for ConfigMap k8s-lookup-tables .data in
# network-observability.yaml still works for diff comparison (ArgoCD
# sees the ConfigMap as Synced after the hook writes live data, so
# selfHeal does not trigger a second sync).
#
# Hook lifecycle:
#   1. ArgoCD sync completes (ConfigMap is header-only at this point)
#   2. ArgoCD creates this Job (deletes any previous run first)
#   3. Job runs the exporter — updates ConfigMap, restarts flow-collector
#      if cluster state changed since the last run
#   4. Job succeeds; ArgoCD marks the sync complete and Healthy
apiVersion: batch/v1
kind: Job
metadata:
  name: k8s-ip-exporter-postsync
  namespace: network-observability
  labels:
    app.kubernetes.io/name: k8s-ip-exporter
    app.kubernetes.io/component: flow-analytics
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ip-exporter
        app.kubernetes.io/component: flow-analytics
    spec:
      serviceAccountName: k8s-ip-exporter
      restartPolicy: OnFailure
      volumes:
        - name: scripts
          configMap:
            name: k8s-ip-exporter-script
            defaultMode: 0555
      containers:
        - name: exporter
          image: python:3.12-slim
          command:
            - python3
            - /scripts/export.py
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
