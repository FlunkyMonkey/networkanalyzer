# Grafana dashboards for flow analytics.
# Picked up automatically by the Grafana sidecar (label: grafana_dashboard: "1").
# Uses the opensearch-flows datasource provisioned by grafana-flow-datasource.yaml.
#
# Query strategy:
#   - All panels use Lucene aggregation queries (bucketAggs + metrics).
#   - PPL is NOT used.
#
# Post-Wave 5 Phase 4 enrichment fields used throughout:
#   - src_display_name / dst_display_name  (friendly name + IP)
#   - dst_app_label   (Kubernetes, Ceph-OSD, DNS, SSH, etc.)
#   - dst_app_category (k8s, storage, network, infrastructure, web, etc.)
#   - dst_app_source   (existing, registry, workload, unlabeled)
#   - Raw src_ip / dst_ip preserved in nested buckets for drill-down link correctness.
#
# Dashboards:
#   flow-top-talkers     uid: flow-top-talkers    — top sources/destinations by bytes
#   flow-destinations    uid: flow-destinations   — per-host destination/port breakdown
#   flow-traffic-mix     uid: flow-traffic-mix    — protocol, app, port distribution
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-flow-dashboards
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: flow-analytics
data:
  flow-top-talkers.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## 📊 Top Talkers\nTop sources and destinations ranked by **total byte volume** over the selected time range. Names show as **hostname (IP)** — e.g. `kube1 (172.18.1.61)` or `unknown-10.244.x.x`. Click **Source IP** or **Destination IP** to drill down into its destination breakdown."
          }
        },
        {
          "title": "Top Sources by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "src_display_name",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                },
                {
                  "id": "4",
                  "type": "terms",
                  "field": "src_ip",
                  "settings": { "size": "1", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "src_display_name" },
                "properties": [{ "id": "custom.width", "value": 220 }]
              },
              {
                "matcher": { "id": "byName", "options": "Source IP" },
                "properties": [
                  { "id": "custom.width", "value": 130 },
                  { "id": "links", "value": [{ "title": "Drill down to destinations", "url": "/d/flow-destinations/flow-destination-analysis?var-src_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": {
              "renameByName": {
                "src_display_name": "Source",
                "src_ip": "Source IP",
                "Sum": "Total Volume",
                "Count": "Flow Count"
              },
              "indexByName": { "Source": 0, "Source IP": 1, "Total Volume": 2, "Flow Count": 3 }
            } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Top Destinations by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_display_name",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                },
                {
                  "id": "4",
                  "type": "terms",
                  "field": "dst_ip",
                  "settings": { "size": "1", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "dst_display_name" },
                "properties": [{ "id": "custom.width", "value": 220 }]
              },
              {
                "matcher": { "id": "byName", "options": "Destination IP" },
                "properties": [
                  { "id": "custom.width", "value": 130 },
                  { "id": "links", "value": [{ "title": "Drill down to destinations", "url": "/d/flow-destinations/flow-destination-analysis?var-dst_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": {
              "renameByName": {
                "dst_display_name": "Destination",
                "dst_ip": "Destination IP",
                "Sum": "Total Volume",
                "Count": "Flow Count"
              },
              "indexByName": { "Destination": 0, "Destination IP": 1, "Total Volume": 2, "Flow Count": 3 }
            } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Total Flow Volume Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "date_histogram",
                  "field": "@timestamp",
                  "settings": { "interval": "auto", "min_doc_count": "0" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "displayName": "Total Volume",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Flow Count Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 23 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "date_histogram",
                  "field": "@timestamp",
                  "settings": { "interval": "auto", "min_doc_count": "0" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "Flow Count",
              "custom": { "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "flows", "top-talkers", "flow-analytics"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Flow — Top Talkers",
      "uid": "flow-top-talkers"
    }

