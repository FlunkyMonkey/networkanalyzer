          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "query": "_exists_:dst_country",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "terms",
                  "field": "dst_country",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Volume" },
                "properties": [{ "id": "unit", "value": "decbytes" }]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_country": "Country", "Sum bytes": "Total Volume" } } }
          ]
        },
        {
          "title": "Top Source IPs by Volume (Inbound View)",
          "description": "All inbound traffic — top source IPs by byte volume. Set Destination IP above to filter for a specific host.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 25 },
          "targets": [
            {
              "refId": "A",
              "query": "dst_ip:$dst_ip",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "src_ip",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Volume" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Source IP" },
                "properties": [
                  { "id": "links", "value": [{ "title": "Drill down to top talkers", "url": "/d/flow-top-talkers/flow-top-talkers?var-src_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "src_ip": "Source IP", "Sum bytes": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "flows", "destinations", "investigation", "flow-analytics"],
      "templating": {
        "list": [
          {
            "name": "src_ip",
            "type": "textbox",
            "label": "Source IP (optional filter)",
            "current": { "value": "*", "text": "*" },
            "query": "*",
            "hide": 0
          },
          {
            "name": "dst_ip",
            "type": "textbox",
            "label": "Destination IP (optional filter)",
            "current": { "value": "*", "text": "*" },
            "query": "*",
            "hide": 0
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Flow — Destination Analysis",
      "uid": "flow-destinations"
    }

