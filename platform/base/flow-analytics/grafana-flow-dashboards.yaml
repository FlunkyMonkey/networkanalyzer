# Grafana dashboards for flow analytics.
# Picked up automatically by the Grafana sidecar (label: grafana_dashboard: "1").
# Uses the opensearch-flows datasource provisioned by grafana-flow-datasource.yaml.
#
# Query strategy:
#   - All panels use Lucene aggregation queries (bucketAggs + metrics).
#   - PPL is NOT used. Lucene agg mode is compatible with all versions of the
#     grafana-opensearch-datasource plugin that support the plugin's ES-compat API.
#   - PPL query path requires live validation before deployment; Lucene agg mode
#     does not — it maps to the standard OpenSearch /_search aggregations API.
#
# Dashboards:
#   flow-top-talkers     uid: flow-top-talkers    — top source IPs by bytes
#   flow-destinations    uid: flow-destinations   — per-host destination/port breakdown
#   flow-traffic-mix     uid: flow-traffic-mix    — protocol, app, country distribution
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-flow-dashboards
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: flow-analytics
data:
  flow-top-talkers.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## 📊 Top Talkers\nTop source and destination IPs ranked by **total byte volume**. Use to identify bandwidth hogs and east-west vs. WAN traffic patterns. Volume-over-time and flow-count panels show trends across the selected window."
          }
        },
        {
          "title": "Top Source IPs by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "src_ip",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Volume" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Source IP" },
                "properties": [
                  { "id": "links", "value": [{ "title": "Drill down to destination analysis", "url": "/d/flow-destinations/flow-destination-analysis?var-src_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "src_ip": "Source IP", "Sum bytes": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Top Destination IPs by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_ip",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Volume" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Destination IP" },
                "properties": [
                  { "id": "links", "value": [{ "title": "Drill down to destination analysis", "url": "/d/flow-destinations/flow-destination-analysis?var-dst_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_ip": "Destination IP", "Sum bytes": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Total Flow Volume Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "date_histogram",
                  "field": "@timestamp",
                  "settings": { "interval": "auto", "min_doc_count": "0" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "displayName": "Total Volume",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Flow Count Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 23 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "date_histogram",
                  "field": "@timestamp",
                  "settings": { "interval": "auto", "min_doc_count": "0" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "Flow Count",
              "custom": { "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "flows", "top-talkers", "flow-analytics"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Flow — Top Talkers",
      "uid": "flow-top-talkers"
    }

  flow-destinations.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## 🔍 Destination Analysis\nWhat destinations are hosts connecting to? Top destination IPs, ports, and countries by byte volume. Use the **Source IP** / **Destination IP** variables above to filter for a specific host. Country panel requires GeoIP enrichment (MaxMind key)."
          }
        },
        {
          "title": "Top Destination IPs by Volume",
          "description": "All outbound traffic — top destination IPs by byte volume. Set Source IP above to filter for a specific host.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "src_ip:$src_ip",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_ip",
                  "settings": { "size": "30", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Volume" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_ip": "Destination IP", "Sum bytes": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Top Destination Ports (with App Label)",
          "description": "Top destination ports by volume. The App column shows the Vector-enriched app label where available. Ports without enrichment show as 'unlabeled'.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "query": "src_ip:$src_ip",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_port",
                  "settings": { "size": "25", "order": "desc", "orderBy": "1" }
                },
                {
                  "id": "4",
                  "type": "terms",
                  "field": "app",
                  "settings": { "size": "1", "order": "desc", "orderBy": "1", "missing": "unlabeled" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Total Volume" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              }
            ]
          },
          "transformations": [
