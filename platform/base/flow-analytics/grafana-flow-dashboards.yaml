# Grafana dashboards for flow analytics.
# Picked up automatically by the Grafana sidecar (label: grafana_dashboard: "1").
# Uses the opensearch-flows datasource provisioned by grafana-flow-datasource.yaml.
#
# Query strategy:
#   - All panels use Lucene aggregation queries (bucketAggs + metrics).
#   - PPL is NOT used.
#
# Dashboards:
#   flow-top-talkers     uid: flow-top-talkers    — top source IPs by bytes
#   flow-destinations    uid: flow-destinations   — per-host destination/port breakdown
#   flow-traffic-mix     uid: flow-traffic-mix    — protocol, app, port distribution
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-flow-dashboards
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: flow-analytics
data:
  flow-top-talkers.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## 📊 Top Talkers\nTop source and destination IPs ranked by **total byte volume** over the selected time range. Click any IP to drill down into its destination breakdown."
          }
        },
        {
          "title": "Top Source IPs by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "src_ip",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Source IP" },
                "properties": [
                  { "id": "links", "value": [{ "title": "Drill down", "url": "/d/flow-destinations/flow-destination-analysis?var-src_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "src_ip": "Source IP", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Top Destination IPs by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_ip",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Destination IP" },
                "properties": [
                  { "id": "links", "value": [{ "title": "Drill down", "url": "/d/flow-destinations/flow-destination-analysis?var-dst_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_ip": "Destination IP", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Total Flow Volume Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "date_histogram",
                  "field": "@timestamp",
                  "settings": { "interval": "auto", "min_doc_count": "0" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "displayName": "Total Volume",
              "custom": { "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Flow Count Over Time",
          "type": "timeseries",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 23 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "2",
                  "type": "date_histogram",
                  "field": "@timestamp",
                  "settings": { "interval": "auto", "min_doc_count": "0" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "Flow Count",
              "custom": { "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "flows", "top-talkers", "flow-analytics"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Flow — Top Talkers",
      "uid": "flow-top-talkers"
    }

  flow-destinations.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## 🔍 Destination Analysis\nWhat destinations are hosts connecting to? Use the **Source IP** / **Destination IP** filters above to narrow down to a specific host. Leave as `*` for all traffic."
          }
        },
        {
          "title": "Top Destination IPs by Volume",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "src_ip:$src_ip",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_ip",
                  "settings": { "size": "30", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_ip": "Destination IP", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Top Destination Ports",
          "description": "Top destination ports by volume. App Label shows Vector-enriched names where available; 'unlabeled' means the port has no mapping yet.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "query": "src_ip:$src_ip",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_port",
                  "settings": { "size": "25", "order": "desc", "orderBy": "1" }
                },
                {
                  "id": "4",
                  "type": "terms",
                  "field": "app",
                  "settings": { "size": "1", "order": "desc", "orderBy": "1", "missing": "unlabeled" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_port": "Port", "app": "App Label", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Destination Countries",
          "description": "Requires GeoIP enrichment. Empty until a MaxMind key is configured in Vector.",
          "type": "text",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 15 },
          "options": {
            "mode": "markdown",
            "content": "### 🌍 Country Breakdown — Not Configured\n\nThis panel requires **MaxMind GeoIP enrichment** which is not currently enabled.\n\nTo enable country-level destination analysis:\n1. Obtain a MaxMind license key\n2. Add GeoIP lookup to Vector config\n3. The `dst_country` field will populate automatically\n\nThis is **expected behavior**, not a data error."
          }
        },
        {
          "title": "Top Source IPs by Volume (Inbound View)",
          "description": "Set Destination IP above to see who is sending traffic to a specific host.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 25 },
          "targets": [
            {
              "refId": "A",
              "query": "dst_ip:$dst_ip",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "src_ip",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Source IP" },
                "properties": [
                  { "id": "links", "value": [{ "title": "Drill down", "url": "/d/flow-destinations/flow-destination-analysis?var-src_ip=${__value.text}" }] }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "src_ip": "Source IP", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "flows", "destinations", "investigation", "flow-analytics"],
      "templating": {
        "list": [
          {
            "name": "src_ip",
            "type": "textbox",
            "label": "Source IP",
            "current": { "value": "*", "text": "*" },
            "query": "*",
            "hide": 0
          },
          {
            "name": "dst_ip",
            "type": "textbox",
            "label": "Destination IP",
            "current": { "value": "*", "text": "*" },
            "query": "*",
            "hide": 0
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Flow — Destination Analysis",
      "uid": "flow-destinations"
    }

  flow-traffic-mix.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## 🔀 Traffic Mix\nWhat applications, protocols, and ports are generating traffic? App labels come from Vector port-based enrichment. Ports without a mapping show as **unlabeled** — these are candidates for adding to the Vector port map."
          }
        },
        {
          "title": "Traffic by Destination Port — Full Breakdown",
          "description": "Every destination port ranked by total volume, with the Vector-enriched app label and layer-4 protocol. 'unlabeled' means the port has no mapping in Vector yet.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 3 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "3", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "4",
                  "type": "terms",
                  "field": "dst_port",
                  "settings": { "size": "30", "order": "desc", "orderBy": "1" }
                },
                {
                  "id": "5",
                  "type": "terms",
                  "field": "app",
                  "settings": { "size": "1", "order": "desc", "orderBy": "1", "missing": "unlabeled" }
                },
                {
                  "id": "6",
                  "type": "terms",
                  "field": "protocol_name",
                  "settings": { "size": "1", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 150 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Port" },
                "properties": [{ "id": "custom.width", "value": 80 }]
              },
              {
                "matcher": { "id": "byName", "options": "App Label" },
                "properties": [{ "id": "custom.width", "value": 160 }]
              },
              {
                "matcher": { "id": "byName", "options": "Protocol" },
                "properties": [{ "id": "custom.width", "value": 90 }]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": {
              "renameByName": { "dst_port": "Port", "app": "App Label", "protocol_name": "Protocol", "Sum": "Total Volume", "Count": "Flow Count" },
              "indexByName": { "Port": 0, "App Label": 1, "Protocol": 2, "Total Volume": 3, "Flow Count": 4 }
            } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Traffic by Application (labeled ports only)",
          "description": "Aggregated view of traffic where Vector has assigned an app label. Unlabeled port traffic is excluded — see the full port table above.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 0, "y": 19 },
          "targets": [
            {
              "refId": "A",
              "query": "_exists_:app",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "app",
                  "settings": { "size": "20", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "app": "Application", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Traffic by Protocol",
          "description": "Layer-4 protocol distribution (TCP, UDP, etc.) by total volume.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 12, "w": 12, "x": 12, "y": 19 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "protocol_name",
                  "settings": { "size": "10", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [
                  { "id": "unit", "value": "decbytes" },
                  { "id": "custom.width", "value": 140 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [
                  { "id": "unit", "value": "short" },
                  { "id": "custom.width", "value": 120 }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "protocol_name": "Protocol", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "🌍 GeoIP / ASN Enrichment — Not Configured",
          "type": "text",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 31 },
          "options": {
            "mode": "markdown",
            "content": "**Country and ASN panels are not shown** because MaxMind GeoIP enrichment is not configured. To enable:\n1. Obtain a MaxMind license key\n2. Add GeoIP lookup to the Vector pipeline\n3. Fields `dst_country` and `dst_as_org` will populate in new flow documents\n\nOnce enabled, country and ASN tables will appear here automatically. This is **expected**, not a data error."
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["network", "flows", "traffic", "protocol", "flow-analytics"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "Flow — Traffic Mix",
      "uid": "flow-traffic-mix"
    }
