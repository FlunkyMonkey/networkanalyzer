              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" }
              ],
              "bucketAggs": [{"id": "2", "type": "date_histogram", "field": "@timestamp", "settings": {"interval": "1d", "min_doc_count": "0"}}]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decbytes",
              "displayName": "Internal-Unknown Volume",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1073741824 },
                  { "color": "red", "value": 10737418240 }
                ]
              }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "Total Flows",
          "type": "stat",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 12 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "count" }
