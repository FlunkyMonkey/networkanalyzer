# Grafana K8s Flow Context dashboard for flow analytics.
# Picked up automatically by the Grafana sidecar (label: grafana_dashboard: "1").
# Uses the opensearch-flows datasource provisioned by grafana-flow-datasource.yaml.
#
# Live enrichment fields (verified 2026-04-26):
#   src_k8s_type / dst_k8s_type           — 100% of flows
#   src_k8s_node / dst_k8s_node           — ~24% of flows (pod/node types)
#   src_k8s_namespace / dst_k8s_namespace  — ~5.5% of flows (pod type only)
#   src_k8s_workload / dst_k8s_workload    — ~5.5% of flows (pod type only)
#   src_k8s_pod / dst_k8s_pod              — ~5.5% of flows (pod type only)
#
# Dashboard uid: flow-k8s-context
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-k8s-context-dashboard
  namespace: network-observability
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: flow-analytics
data:
  flow-k8s-context.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "",
          "type": "text",
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "## ☸️ Kubernetes Flow Context\nEvery flow's source and destination IP is classified into one of these categories:\n\n| Type | Meaning |\n|---|---|\n| **pod** | Matched a known pod IP — namespace, workload, and node are available |\n| **node** | Matched a K8s node IP — node name is available |\n| **external** | IP is outside all K8s CIDRs (internet or non-K8s LAN hosts) |\n| **internal-unknown** | IP is inside K8s CIDR but didn't match any known pod/node/service — usually means the enrichment CronJob hasn't caught up with new pods |"
          }
        },
        {
          "title": "Source Type — by Total Volume",
          "description": "How much traffic originates from each K8s entity type.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "src_k8s_type",
                  "settings": { "size": "10", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [{ "id": "unit", "value": "decbytes" }, { "id": "custom.width", "value": 140 }]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [{ "id": "unit", "value": "short" }, { "id": "custom.width", "value": 120 }]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "src_k8s_type": "Source Type", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "Destination Type — by Total Volume",
          "description": "How much traffic is destined for each K8s entity type.",
          "type": "table",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "refId": "A",
              "query": "",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "sum", "field": "bytes" },
                { "id": "2", "type": "count" }
              ],
              "bucketAggs": [
                {
                  "id": "3",
                  "type": "terms",
                  "field": "dst_k8s_type",
                  "settings": { "size": "10", "order": "desc", "orderBy": "1" }
                }
              ]
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Sum" },
                "properties": [{ "id": "unit", "value": "decbytes" }, { "id": "custom.width", "value": 140 }]
              },
              {
                "matcher": { "id": "byName", "options": "Flow Count" },
                "properties": [{ "id": "unit", "value": "short" }, { "id": "custom.width", "value": 120 }]
              }
            ]
          },
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "dst_k8s_type": "Destination Type", "Sum": "Total Volume", "Count": "Flow Count" } } }
          ],
          "options": { "sortBy": [{ "displayName": "Total Volume", "desc": true }] }
        },
        {
          "title": "⚠️ Internal-Unknown Flows",
          "description": "Flows where the IP is inside K8s CIDR but didn't match any known pod/node/service.",
          "type": "stat",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 12 },
          "targets": [
            {
              "refId": "A",
              "query": "src_k8s_type:internal-unknown OR dst_k8s_type:internal-unknown",
              "queryType": "lucene",
              "timeField": "@timestamp",
              "metrics": [
                { "id": "1", "type": "count" }
              ],
              "bucketAggs": [{"id": "2", "type": "date_histogram", "field": "@timestamp", "settings": {"interval": "1d", "min_doc_count": "0"}}]
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "displayName": "Internal-Unknown Flows",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10000 },
                  { "color": "orange", "value": 100000 },
                  { "color": "red", "value": 500000 }
                ]
              }
            }
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "Internal-Unknown Volume",
          "description": "Total bytes for flows classified as internal-unknown. Compare with total flow volume to gauge enrichment gaps.",
          "type": "stat",
          "datasource": { "type": "grafana-opensearch-datasource", "uid": "opensearch-flows" },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 12 },
          "targets": [
            {
              "refId": "A",
              "query": "src_k8s_type:internal-unknown OR dst_k8s_type:internal-unknown",
