apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: network-observability
  labels:
    app.kubernetes.io/name: flow-collector
    app.kubernetes.io/component: flow-analytics
data:
  vector.yaml: |
    api:
      enabled: true
      address: "0.0.0.0:8686"

    sources:
      goflow2_file:
        type: file
        include:
          - /flows/flows.jsonl
        read_from: beginning
        fingerprint:
          strategy: device_and_inode

    transforms:
      parse_flow:
        type: remap
        inputs:
          - goflow2_file
        source: |
          # Parse JSON from GoFlow2 v2 output.
          # GoFlow2 v2 emits snake_case field names and nanosecond timestamps.
          # Use fallible parse_json (no !) so malformed lines are dropped
          # gracefully instead of hard-aborting the transform.
          result, err = parse_json(.message)
          if err != null { abort }
          . = result

          # Normalize field names to match the canonical entity model.
          # src_port, dst_port, bytes, packets, tcp_flags keep their names.
          .src_ip  = .src_addr
          .dst_ip  = .dst_addr
          # .proto is intentionally NOT renamed here; enrich_meta reads it
          # as a string label (e.g. "TCP") to derive both protocol_name and
          # the IANA integer for .protocol.

          # Timestamp — GoFlow2 v2 emits nanosecond epoch integers.
          # Divide by 1_000_000 → epoch_millis (OpenSearch date default format).
          .flow_start = (to_int(.time_flow_start_ns) ?? 0) / 1000000
          .flow_end   = (to_int(.time_flow_end_ns)   ?? 0) / 1000000
          .@timestamp = format_timestamp!(now(), "%Y-%m-%dT%H:%M:%SZ")

          # Flow direction and type metadata.
          .flow_type = .type
          .exporter  = .sampler_address

          # Clean up raw GoFlow2 fields no longer needed after this stage.
          # .proto is NOT deleted here — enrich_meta uses it.
          del(.src_addr)
          del(.dst_addr)
          del(.time_flow_start_ns)
          del(.time_flow_end_ns)
          del(.time_received_ns)
          del(.type)
          del(.sampler_address)
          del(.message)
          del(.source_type)
          del(.file)
          del(.host)

      enrich_meta:
        type: remap
        inputs:
          - parse_flow
        source: |
          # Protocol: GoFlow2 v2 emits .proto as a string label ("TCP", "UDP"…).
          # Derive protocol_name from the raw label, then reverse-map to IANA
          # integer for the OpenSearch integer-typed .protocol field.
          .protocol_name = to_string(.proto) ?? null
          proto_int_map = { "ICMP": 1, "TCP": 6, "UDP": 17, "GRE": 47 }
          .protocol = get(proto_int_map, [to_string(.proto) ?? ""]) ?? null
          del(.proto)

          # Port-to-app lookup using object key access.
          # (Avoids else-if chain: VRL parser treats } at end-of-line as statement
          # end, so else on the next line becomes a syntax error.)
          port = to_int(.dst_port) ?? 0
          port_apps = {
            "80": "HTTP",   "443": "HTTPS",  "53": "DNS",    "22": "SSH",
            "25": "SMTP",   "465": "SMTP",   "587": "SMTP",
            "143": "IMAP",  "993": "IMAP",
            "110": "POP3",  "995": "POP3",
            "3306": "MySQL", "5432": "PostgreSQL", "6379": "Redis",
            "8080": "HTTP-Alt", "8443": "HTTP-Alt",
            "1194": "OpenVPN", "51820": "WireGuard",
            "123": "NTP",   "161": "SNMP",   "162": "SNMP"
          }
          .app = get(port_apps, [to_string(port)]) ?? null

          # GeoIP enrichment is disabled — no MaxMind license key is configured.
          # When a license key is available, re-enable by:
          #   1. Adding enrichment_tables (geoip_city, geoip_asn) back to this config.
          #   2. Adding get_enrichment_table_record calls here for dst_ip / src_ip.
          # The geoip-init init container already handles the download when the
          # geoip-credentials secret is present.

    sinks:
      opensearch:
        type: elasticsearch
        inputs:
          - enrich_meta
        endpoints:
          - "http://opensearch-cluster-master:9200"
        # api_version v8 suppresses the _type field that OpenSearch 2+ rejects.
        api_version: "v8"
        mode: bulk
        bulk:
          index: "flows-%Y.%m.%d"
          action: create
        healthcheck:
          enabled: true
