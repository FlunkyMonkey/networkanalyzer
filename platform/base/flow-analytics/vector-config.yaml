apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: network-observability
  labels:
    app.kubernetes.io/name: flow-collector
    app.kubernetes.io/component: flow-analytics
data:
  vector.yaml: |
    api:
      enabled: true
      address: "0.0.0.0:8686"

    sources:
      goflow2_file:
        type: file
        include:
          - /flows/flows.jsonl
        read_from: beginning
        fingerprint:
          strategy: device_and_inode

    transforms:
      parse_flow:
        type: remap
        inputs:
          - goflow2_file
        source: |
          # Parse JSON from GoFlow2 output.
          . = parse_json!(.message)

          # Normalize field names to match the canonical entity model.
          .src_ip = .SrcAddr
          .dst_ip = .DstAddr
          .src_port = .SrcPort
          .dst_port = .DstPort
          .protocol = .Proto
          .bytes = .Bytes
          .packets = .Packets
          .tcp_flags = .TCPFlags

          # Timestamp — GoFlow2 emits integer epoch seconds.
          # Multiply by 1000 → epoch_millis, which OpenSearch date fields accept
          # by default (strict_date_optional_time||epoch_millis).
          # Avoids to_timestamp so no VRL runtime compatibility risk.
          .flow_start = (to_int(.TimeFlowStart) ?? 0) * 1000
          .flow_end   = (to_int(.TimeFlowEnd)   ?? 0) * 1000
          .@timestamp = format_timestamp!(now(), "%Y-%m-%dT%H:%M:%SZ")

          # Flow direction and type metadata.
          .flow_type = .Type
          .exporter = .SamplerAddress

          # Clean up raw GoFlow2 fields to reduce index size.
          del(.SrcAddr)
          del(.DstAddr)
          del(.SrcPort)
          del(.DstPort)
          del(.Proto)
          del(.Bytes)
          del(.Packets)
          del(.TCPFlags)
          del(.TimeFlowStart)
          del(.TimeFlowEnd)
          del(.Type)
          del(.SamplerAddress)
          del(.message)
          del(.source_type)
          del(.file)
          del(.host)

      enrich_meta:
        type: remap
        inputs:
          - parse_flow
        source: |
          # Port-to-app lookup using object key access.
          # (Avoids else-if chain: VRL parser treats } at end-of-line as statement
          # end, so else on the next line becomes a syntax error.)
          port = to_int(.dst_port) ?? 0
          port_apps = {
            "80": "HTTP",   "443": "HTTPS",  "53": "DNS",    "22": "SSH",
            "25": "SMTP",   "465": "SMTP",   "587": "SMTP",
            "143": "IMAP",  "993": "IMAP",
            "110": "POP3",  "995": "POP3",
            "3306": "MySQL", "5432": "PostgreSQL", "6379": "Redis",
            "8080": "HTTP-Alt", "8443": "HTTP-Alt",
            "1194": "OpenVPN", "51820": "WireGuard",
            "123": "NTP",   "161": "SNMP",   "162": "SNMP"
          }
          .app = get(port_apps, [to_string(port)]) ?? null

          # Protocol number to name.
          proto = to_int(.protocol) ?? 0
          proto_names = { "1": "ICMP", "6": "TCP", "17": "UDP", "47": "GRE" }
          .protocol_name = get(proto_names, [to_string(proto)]) ?? to_string(proto)

          # GeoIP enrichment is disabled — no MaxMind license key is configured.
          # When a license key is available, re-enable by:
          #   1. Adding enrichment_tables (geoip_city, geoip_asn) back to this config.
          #   2. Adding get_enrichment_table_record calls here for dst_ip / src_ip.
          # The geoip-init init container already handles the download when the
          # geoip-credentials secret is present.

    sinks:
      opensearch:
        type: elasticsearch
        inputs:
          - enrich_meta
        endpoints:
          - "http://opensearch-cluster-master:9200"
        mode: bulk
        bulk:
          index: "flows-%Y.%m.%d"
          action: create
        healthcheck:
          enabled: true
