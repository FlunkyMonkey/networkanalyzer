apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: network-observability
  labels:
    app.kubernetes.io/name: flow-collector
    app.kubernetes.io/component: flow-analytics
data:
  vector.yaml: |
    api:
      enabled: true
      address: "0.0.0.0:8686"

    # K8s IP lookup tables (Wave 3b).
    # Files are written by the k8s-ip-exporter CronJob via ConfigMap PATCH.
    # Vector 0.45.0 does not live-reload these tables — a pod restart is
    # required to pick up new content.  The CronJob handles the restart.
    # On initial startup (before first CronJob run), all three files contain
    # headers only; all IPs classify as "external" until data is populated.
    enrichment_tables:
      k8s_pods:
        type: file
        file:
          path: /etc/vector/k8s-tables/pods.csv
          encoding:
            type: csv
        schema:
          ip: string
          namespace: string
          workload: string
          pod: string
          node: string
          _timestamp: integer

      k8s_services:
        type: file
        file:
          path: /etc/vector/k8s-tables/services.csv
          encoding:
            type: csv
        schema:
          ip: string
          namespace: string
          service: string
          _timestamp: integer

      k8s_nodes:
        type: file
        file:
          path: /etc/vector/k8s-tables/nodes.csv
          encoding:
            type: csv
        schema:
          ip: string
          node: string
          _timestamp: integer

      # Post-Wave 5 enrichment tables (flow-enrichment-tables ConfigMap).
      # GitOps-owned / operator-curated. Pod restart required to reload.
      app_ports:
        type: file
        file:
          path: /etc/vector/flow-enrichment/app-port-registry.csv
          encoding:
            type: csv
        schema:
          port: integer
          protocol: string
          app: string
          category: string
          direction: string
          scope: string
          notes: string

      hostname_map:
        type: file
        file:
          path: /etc/vector/flow-enrichment/hostname-map.csv
          encoding:
            type: csv
        schema:
          ip: string
          hostname: string
          short_name: string
          device_type: string
          notes: string

    sources:
      goflow2_file:
        type: file
        include:
          - /flows/flows.jsonl
        read_from: beginning
        fingerprint:
          strategy: device_and_inode

    transforms:
      parse_flow:
        type: remap
        inputs:
          - goflow2_file
        source: |
          # Parse JSON from GoFlow2 v2 output.
          # GoFlow2 v2 emits snake_case field names and nanosecond timestamps.
          # Use fallible parse_json (no !) so malformed lines are dropped
          # gracefully instead of hard-aborting the transform.
          result, err = parse_json(.message)
          if err != null { abort }
          . = result

          # Normalize field names to match the canonical entity model.
          # src_port, dst_port, bytes, packets, tcp_flags keep their names.
          .src_ip  = .src_addr
          .dst_ip  = .dst_addr
          # .proto is intentionally NOT renamed here; enrich_meta reads it
          # as a string label (e.g. "TCP") to derive both protocol_name and
          # the IANA integer for .protocol.

          # Timestamp — GoFlow2 v2 emits nanosecond epoch integers.
          # Divide by 1_000_000 → epoch_millis (OpenSearch date default format).
          .flow_start = (to_int(.time_flow_start_ns) ?? 0) / 1000000
          .flow_end   = (to_int(.time_flow_end_ns)   ?? 0) / 1000000
          .@timestamp = format_timestamp!(now(), "%Y-%m-%dT%H:%M:%SZ")

          # Flow direction and type metadata.
          .flow_type = .type
          .exporter  = .sampler_address

          # Clean up raw GoFlow2 fields no longer needed after this stage.
          # .proto is NOT deleted here — enrich_meta uses it.
          del(.src_addr)
          del(.dst_addr)
          del(.time_flow_start_ns)
          del(.time_flow_end_ns)
          del(.time_received_ns)
          del(.type)
          del(.sampler_address)
          del(.message)
          del(.source_type)
          del(.file)
          del(.host)

      enrich_meta:
        type: remap
        inputs:
          - parse_flow
        source: |
          # Protocol: GoFlow2 v2 emits .proto as a string label ("TCP", "UDP"…).
          # Derive protocol_name from the raw label, then reverse-map to IANA
          # integer for the OpenSearch integer-typed .protocol field.
          .protocol_name = to_string(.proto) ?? null
          proto_int_map = { "ICMP": 1, "TCP": 6, "UDP": 17, "GRE": 47 }
          .protocol = get(proto_int_map, [to_string(.proto) ?? ""]) ?? null
          del(.proto)

          # Port-to-app lookup using object key access.
          # (Avoids else-if chain: VRL parser treats } at end-of-line as statement
          # end, so else on the next line becomes a syntax error.)
          port = to_int(.dst_port) ?? 0
          port_apps = {
            "22": "SSH",      "25": "SMTP",     "53": "DNS",
            "80": "HTTP",     "110": "POP3",    "123": "NTP",
            "143": "IMAP",    "161": "SNMP",    "162": "SNMP",
            "443": "HTTPS",   "445": "SMB",     "465": "SMTP",
            "587": "SMTP",    "853": "DNS-TLS", "993": "IMAP",
            "995": "POP3",    "1194": "OpenVPN","1883": "MQTT",
            "2049": "NFS",    "3000": "Grafana","3306": "MySQL",
            "5432": "Postgres","6379": "Redis", "6443": "Kubernetes",
            "8006": "Proxmox","8080": "HTTP-Alt","8443": "HTTPS-Alt",
            "9000": "MinIO",  "9090": "Prometheus","9093": "Alertmanager",
            "9100": "NodeExporter","9200": "OpenSearch","9300": "OpenSearch-Transport",
            "51820": "WireGuard"
          }
          .app = get(port_apps, [to_string(port)]) ?? null

          # GeoIP enrichment is disabled — no MaxMind license key is configured.
          # When a license key is available, re-enable by:
          #   1. Adding enrichment_tables (geoip_city, geoip_asn) back to this config.
          #   2. Adding get_enrichment_table_record calls here for dst_ip / src_ip.
          # The geoip-init init container already handles the download when the
          # geoip-credentials secret is present.

      enrich_k8s:
        type: remap
        inputs:
          - enrich_meta
        source: |
          # K8s IP classification — precedence-ordered per wave-3-plan.md:
          #   1. pod   — IP in k8s_pods table (hostNetwork pods excluded at export time)
          #   2. service — IP in k8s_services table (ClusterIP only)
          #   3. node  — IP in k8s_nodes table
          #   4. internal-unknown — IP in pod/service CIDR but no table match (stale/new)
          #   5. external — IP outside all known CIDRs and node IPs
          #
          # Pod CIDR 10.244.0.0/16  |  Service CIDR 10.96.0.0/12
          # Node IPs 172.18.1.61–172.18.1.64 are covered by the k8s_nodes table.
          #
          # Variable naming: r/e reused across src and dst sections (VRL allows
          # reassignment).  Nested if/else (not else-if chains) avoids the VRL
          # parser issue where } at end-of-line terminates an assignment expression.

          # --- src_ip ---
          src = to_string(.src_ip) ?? ""
          if src != "" {
            r, e = get_enrichment_table_record("k8s_pods", {"ip": src})
            if e == null {
              .src_k8s_namespace = r.namespace
              .src_k8s_workload  = r.workload
              .src_k8s_pod       = r.pod
              .src_k8s_node      = r.node
              .src_k8s_type      = "pod"
            } else {
              r, e = get_enrichment_table_record("k8s_services", {"ip": src})
              if e == null {
                .src_k8s_namespace = r.namespace
                .src_k8s_service   = r.service
                .src_k8s_type      = "service"
              } else {
                r, e = get_enrichment_table_record("k8s_nodes", {"ip": src})
                if e == null {
                  .src_k8s_node = r.node
                  .src_k8s_type = "node"
                } else {
                  src_pod_cidr, err = ip_cidr_contains("10.244.0.0/16", src)
                  if err != null { src_pod_cidr = false }
                  src_svc_cidr, err = ip_cidr_contains("10.96.0.0/12", src)
                  if err != null { src_svc_cidr = false }
                  src_int = src_pod_cidr || src_svc_cidr
                  if src_int { .src_k8s_type = "internal-unknown" } else { .src_k8s_type = "external" }
                }
              }
            }
          }

          # --- dst_ip ---
          dst = to_string(.dst_ip) ?? ""
          if dst != "" {
            r, e = get_enrichment_table_record("k8s_pods", {"ip": dst})
            if e == null {
              .dst_k8s_namespace = r.namespace
              .dst_k8s_workload  = r.workload
              .dst_k8s_pod       = r.pod
              .dst_k8s_node      = r.node
              .dst_k8s_type      = "pod"
            } else {
              r, e = get_enrichment_table_record("k8s_services", {"ip": dst})
              if e == null {
                .dst_k8s_namespace = r.namespace
                .dst_k8s_service   = r.service
                .dst_k8s_type      = "service"
              } else {
                r, e = get_enrichment_table_record("k8s_nodes", {"ip": dst})
                if e == null {
                  .dst_k8s_node = r.node
                  .dst_k8s_type = "node"
                } else {
                  dst_pod_cidr, err = ip_cidr_contains("10.244.0.0/16", dst)
                  if err != null { dst_pod_cidr = false }
                  dst_svc_cidr, err = ip_cidr_contains("10.96.0.0/12", dst)
                  if err != null { dst_svc_cidr = false }
                  dst_int = dst_pod_cidr || dst_svc_cidr
                  if dst_int { .dst_k8s_type = "internal-unknown" } else { .dst_k8s_type = "external" }
                }
              }
            }
          }

      enrich_flow:
        type: remap
        inputs:
          - enrich_k8s
        source: |
          # --- App label enrichment from port registry ---
          # Priority: existing .app (hardcoded map) > registry match > unlabeled.
          # dst_app_label / dst_app_category / dst_app_source are always set.
          port_int = to_int(.dst_port) ?? 0
          proto    = to_string(.protocol_name) ?? ""
          r, e = get_enrichment_table_record("app_ports", {"port": port_int, "protocol": proto})
          if .app != null {
            .dst_app_label  = .app
            .dst_app_source = "existing"
            if e == null { .dst_app_category = r.category }
          } else if e == null {
            .dst_app_label    = r.app
            .dst_app_category = r.category
            .dst_app_source   = "registry"
          } else {
            .dst_app_source = "unlabeled"
          }

          # --- Hostname / display-name enrichment ---
          # Known host: "short_name (ip)"
          # Unknown RFC1918:  "unknown-<ip>"
          # Public IP: raw IP (GeoIP in Wave 7)

          src_str = to_string(.src_ip) ?? ""
          if src_str != "" {
            r, e = get_enrichment_table_record("hostname_map", {"ip": src_str})
            if e == null {
              .src_hostname     = r.hostname
              .src_display_name = string!(r.short_name) + " (" + src_str + ")"
            } else {
              src_c1, err = ip_cidr_contains("10.0.0.0/8", src_str)
              if err != null { src_c1 = false }
              src_c2, err = ip_cidr_contains("172.16.0.0/12", src_str)
              if err != null { src_c2 = false }
              src_c3, err = ip_cidr_contains("192.168.0.0/16", src_str)
              if err != null { src_c3 = false }
              if src_c1 || src_c2 || src_c3 {
                .src_display_name = "unknown-" + src_str
              } else {
                .src_display_name = src_str
              }
            }
          }

          dst_str = to_string(.dst_ip) ?? ""
          if dst_str != "" {
            r, e = get_enrichment_table_record("hostname_map", {"ip": dst_str})
            if e == null {
              .dst_hostname     = r.hostname
              .dst_display_name = string!(r.short_name) + " (" + dst_str + ")"
            } else {
              dst_c1, err = ip_cidr_contains("10.0.0.0/8", dst_str)
              if err != null { dst_c1 = false }
              dst_c2, err = ip_cidr_contains("172.16.0.0/12", dst_str)
              if err != null { dst_c2 = false }
              dst_c3, err = ip_cidr_contains("192.168.0.0/16", dst_str)
              if err != null { dst_c3 = false }
              if dst_c1 || dst_c2 || dst_c3 {
                .dst_display_name = "unknown-" + dst_str
              } else {
                .dst_display_name = dst_str
              }
            }
          }

    sinks:
      opensearch:
        type: elasticsearch
        inputs:
          - enrich_flow
        endpoints:
          - "http://opensearch-cluster-master:9200"
        # api_version v8 suppresses the _type field that OpenSearch 2+ rejects.
        api_version: "v8"
        mode: bulk
        bulk:
          index: "flows-%Y.%m.%d"
          action: create
        healthcheck:
          enabled: true
