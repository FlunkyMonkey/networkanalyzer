# OpenSearch ISM (Index State Management) policy for flow data retention.
# Applied as a ConfigMap — must be loaded into OpenSearch via API after deployment.
# See docs/observability/flow-ingest-and-cutover.md for bootstrap steps.
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-ism-policy
  namespace: network-observability
  labels:
    app.kubernetes.io/component: flow-analytics
data:
  flow-retention-policy.json: |
    {
      "policy": {
        "policy_id": "flow-retention-14d",
        "description": "Retain granular flow data for 14 days, then delete. Wave 2 approved retention.",
        "default_state": "hot",
        "states": [
          {
            "name": "hot",
            "actions": [],
            "transitions": [
              {
                "state_name": "delete",
                "conditions": {
                  "min_index_age": "14d"
                }
              }
            ]
          },
          {
            "name": "delete",
            "actions": [
              {
                "delete": {}
              }
            ],
            "transitions": []
          }
        ],
        "ism_template": [
          {
            "index_patterns": ["flows-*"],
            "priority": 100
          }
        ]
      }
    }
