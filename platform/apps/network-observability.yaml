apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-observability
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: network-observability
spec:
  project: default
  source:
    repoURL: https://github.com/FlunkyMonkey/networkanalyzer.git
    targetRevision: main
    path: platform/overlays/lab
  destination:
    # TODO: Replace with your cluster API server or use 'in-cluster'
    server: https://kubernetes.default.svc
    namespace: network-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # Ignore the restartedAt annotation written by k8s-ip-exporter CronJob.
  # Without this, ArgoCD selfHeal would revert the annotation within seconds
  # of each CronJob run, leaving flow-collector with stale enrichment tables.
  # The annotation lives at spec.template.metadata.annotations and is written
  # by the standard kubectl rollout restart pattern.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: flow-collector
      namespace: network-observability
      jqPathExpressions:
        - '.spec.template.metadata.annotations["kubectl.kubernetes.io/restartedAt"]'
    # Ignore live CSV data written by k8s-ip-exporter CronJob.
    # The repo holds header-only placeholder content; the CronJob PATCHes
    # real pod/service/node data at runtime.  Without this, ArgoCD selfHeal
    # reverts the ConfigMap to placeholder content on every sync cycle.
    - kind: ConfigMap
      name: k8s-lookup-tables
      namespace: network-observability
      jqPathExpressions:
        - '.data'
    # Ignore Kubernetes-defaulted fields on the OpenSearch StatefulSet that are
    # not emitted by the Helm chart but are added by the API server at creation
    # time. These are all safe generated/defaulted values:
    #   persistentVolumeClaimRetentionPolicy — K8s 1.27+ server default (Retain)
    #   revisionHistoryLimit                 — K8s default (10)
    #   volumeClaimTemplates[].apiVersion    — K8s adds "v1" at creation
    #   volumeClaimTemplates[].kind          — K8s adds "PersistentVolumeClaim"
    #   volumeClaimTemplates[].metadata.creationTimestamp — K8s generated (null)
    #   volumeClaimTemplates[].spec.volumeMode            — K8s default "Filesystem"
    #   volumeClaimTemplates[].status                     — K8s status subresource
    # None of these affect image, resources, storage size, storageClassName,
    # labels, configchecksum, env, or container args.
    - group: apps
      kind: StatefulSet
      name: opensearch-cluster-master
      namespace: network-observability
      jqPathExpressions:
        - '.spec.persistentVolumeClaimRetentionPolicy'
        - '.spec.revisionHistoryLimit'
        - '.spec.volumeClaimTemplates[].apiVersion'
        - '.spec.volumeClaimTemplates[].kind'
        - '.spec.volumeClaimTemplates[].metadata.creationTimestamp'
        - '.spec.volumeClaimTemplates[].spec.volumeMode'
        - '.spec.volumeClaimTemplates[].status'
