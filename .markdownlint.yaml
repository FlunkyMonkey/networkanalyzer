# Minimal markdownlint configuration
# Keeps docs consistent without being overly strict

# Allow long lines — tables and URLs often exceed 80 chars
MD013: false

# Allow multiple top-level headings — some docs have logical sections
MD025: false

# Allow trailing punctuation in headings — question marks in decision docs
MD026:
  punctuation: ".,;:!"

# Allow inline HTML — needed for some table formatting
MD033: false

# Allow bold text used as pseudo-headings (e.g., **Deliverables:**)
MD036: false

# Allow compact table separator style (|---|---|)
MD060: false
